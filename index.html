<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가구 외형 설계</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f5f5f5; font-size: 14px; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100vh; }

.header {
  background: #1a1a2e; color: white;
  padding: 12px 20px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header span { font-size: 12px; color: #aaa; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── Survey panel ── */
.survey {
  width: 360px; min-width: 300px;
  background: white;
  border-right: 1px solid #ddd;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.survey-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.survey-nav {
  padding: 12px 16px;
  border-top: 1px solid #eee;
  display: flex; gap: 8px;
  flex-shrink: 0;
}

/* Progress bar */
.progress { display: flex; gap: 3px; margin-bottom: 16px; }
.prog-seg { flex: 1; height: 4px; border-radius: 2px; background: #e8e8e8; transition: background .25s; }
.prog-seg.done { background: #2a9d8f; }
.prog-seg.active { background: #4361ee; }

.step-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.step-title { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 18px; }

/* Type selection cards */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-card {
  border: 2px solid #e8e8e8; border-radius: 10px;
  padding: 14px 8px; cursor: pointer;
  text-align: center; background: white;
  transition: all .15s; font-family: inherit;
}
.type-card:hover { border-color: #4361ee; background: #f4f6ff; }
.type-card.sel { border-color: #4361ee; background: #eef0ff; }
.type-card .ico { font-size: 26px; margin-bottom: 5px; }
.type-card .nm  { font-size: 12px; font-weight: 700; }
.type-card .sub { font-size: 10px; color: #999; margin-top: 2px; }

/* Size inputs */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; }
.field-row { display: flex; align-items: center; gap: 8px; }
.field-row input[type=range] { flex: 1; accent-color: #4361ee; }
.field-row input[type=number] {
  width: 76px; padding: 6px 8px;
  border: 1px solid #ccc; border-radius: 6px;
  font-size: 13px; font-family: inherit; text-align: right;
}
.field-row input:focus { outline: none; border-color: #4361ee; }
.unit { font-size: 11px; color: #999; }

/* Number buttons */
.nbtn-row { display: flex; gap: 6px; }
.nbtn {
  width: 48px; height: 48px;
  border: 2px solid #e8e8e8; border-radius: 8px;
  background: white; font-size: 18px; font-weight: 700;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.nbtn.sel { border-color: #4361ee; background: #eef0ff; color: #4361ee; }
.nbtn:hover:not(.sel) { border-color: #4361ee; }

/* Column config cards */
.col-card {
  background: #f8f9ff; border: 1px solid #e3e8ff;
  border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
}
.col-card-title { font-size: 11px; font-weight: 700; color: #4361ee; margin-bottom: 7px; }
.ctype-row { display: flex; gap: 4px; }
.ctype-btn {
  flex: 1; padding: 5px 3px;
  border: 1px solid #ccc; border-radius: 6px;
  background: white; font-size: 11px;
  cursor: pointer; font-family: inherit; text-align: center; transition: all .15s;
}
.ctype-btn.sel { background: #4361ee; color: white; border-color: #4361ee; }
.sub-field { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
.sub-field label { font-size: 11px; color: #555; }
.sub-field input[type=number] {
  width: 46px; padding: 3px 6px;
  border: 1px solid #ccc; border-radius: 5px;
  font-size: 12px; font-family: inherit; margin-left: 4px;
}

/* Toggle buttons */
.toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
.tbtn {
  flex: 1; padding: 10px 6px;
  border: 2px solid #e8e8e8; border-radius: 8px;
  background: white; font-size: 13px;
  cursor: pointer; font-family: inherit; text-align: center; transition: all .15s;
}
.tbtn.sel { border-color: #4361ee; background: #eef0ff; color: #4361ee; font-weight: 600; }

/* Nav buttons */
.btn-next {
  flex: 1; padding: 10px;
  background: #4361ee; color: white;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-next:disabled { background: #c5c5c5; cursor: default; }
.btn-prev {
  padding: 10px 14px;
  background: white; color: #4361ee;
  border: 2px solid #4361ee; border-radius: 8px;
  font-size: 13px; cursor: pointer; font-family: inherit;
}

/* Result tags */
.tag {
  display: inline-block; padding: 2px 9px;
  background: #eef0ff; color: #4361ee;
  border-radius: 12px; font-size: 11px;
  margin: 2px;
}
.result-box {
  background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 8px; padding: 12px 14px; margin-bottom: 14px;
}
.result-title { font-weight: 700; color: #166534; margin-bottom: 6px; font-size: 14px; }
.result-row { font-size: 12px; color: #444; line-height: 1.9; }

/* ── Canvas panel ── */
.canvas-panel {
  flex: 1; overflow: auto;
  background: #e8ecf0;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
canvas#cv {
  background: white;
  box-shadow: 0 6px 24px rgba(0,0,0,.13);
  display: block;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="1" y="3" width="20" height="16" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
      <line x1="1" y1="8" x2="21" y2="8" stroke="white" stroke-width="1.5"/>
      <line x1="11" y1="8" x2="11" y2="19" stroke="white" stroke-width="1.5"/>
    </svg>
    <h1>가구 외형 설계</h1>
    <span>설문으로 가구 외형을 그립니다</span>
  </div>

  <div class="main">
    <div class="survey">
      <div class="survey-scroll" id="surveyScroll">
        <div class="progress" id="progBar"></div>
        <div id="stepBody"></div>
      </div>
      <div class="survey-nav">
        <button class="btn-prev" id="btnPrev" onclick="prev()">← 이전</button>
        <button class="btn-next" id="btnNext" onclick="next()">다음 →</button>
      </div>
    </div>

    <div class="canvas-panel" id="cvPanel">
      <canvas id="cv"></canvas>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────
const S = {
  step: 0,
  type: null,
  w: 900, h: 1800, d: 580,
  vCols: 1,
  cols: [{ type: 'shelf', shelves: 3, drawers: 0 }],
  hasDoor: true,
  doorType: 'swing',   // 'swing' | 'slide'
  handle: 'bar'        // 'bar' | 'knob' | 'none'
};

const TOTAL_STEPS = 5;

const FTYPES = [
  { id: 'wardrobe',     ico: '🚪', nm: '옷장 / 장롱',  sub: '양문형·미닫이',   w: 1200, h: 2000, d: 580 },
  { id: 'bookcase',     ico: '📚', nm: '책장',          sub: '오픈 선반',       w: 900,  h: 1800, d: 350 },
  { id: 'drawer',       ico: '🗄',  nm: '서랍장',        sub: '다단 서랍',       w: 800,  h: 900,  d: 450 },
  { id: 'storage',      ico: '📦', nm: '수납장',         sub: '범용 수납',       w: 900,  h: 1800, d: 450 },
  { id: 'shoe',         ico: '👟', nm: '신발장',         sub: '현관 수납',       w: 900,  h: 1200, d: 350 },
  { id: 'kitchenbase',  ico: '🍳', nm: '주방 하부장',    sub: '싱크대 하부',     w: 600,  h: 820,  d: 580 },
];

// ── Nav ──────────────────────────────────────────────
function next() {
  if (S.step === 0 && !S.type) return;
  if (S.step < TOTAL_STEPS - 1) { S.step++; render(); }
}
function prev() {
  if (S.step > 0) { S.step--; render(); }
}

// ── Size sync helper ─────────────────────────────────
function syncSize(key, raw) {
  const v = parseInt(raw);
  if (isNaN(v)) return;
  S[key] = v;
  const sl = document.getElementById('sl_' + key);
  const nm = document.getElementById('nm_' + key);
  if (sl && sl !== document.activeElement) sl.value = v;
  if (nm && nm !== document.activeElement) nm.value = v;
  const info = document.getElementById('sizeInfo');
  if (info) info.textContent = `W ${S.w} × H ${S.h} × D ${S.d} mm`;
  draw();
}

// ── Column helpers ───────────────────────────────────
function ensureCols() {
  while (S.cols.length < S.vCols) S.cols.push({ type: 'shelf', shelves: 3, drawers: 0 });
  S.cols.length = S.vCols;
}
function setVCols(n) { S.vCols = n; ensureCols(); render(); draw(); }
function setColType(i, t) {
  S.cols[i].type = t;
  if (t === 'drawer' && !S.cols[i].drawers) S.cols[i].drawers = 3;
  if (t === 'mixed') { S.cols[i].shelves = S.cols[i].shelves || 2; S.cols[i].drawers = S.cols[i].drawers || 2; }
  renderColConfigs();
  draw();
}
function setColShelves(i, v) { S.cols[i].shelves = parseInt(v) || 0; draw(); }
function setColDrawers(i, v) { S.cols[i].drawers = parseInt(v) || 1; draw(); }

// ── Step renderers ───────────────────────────────────
function render() {
  // progress
  const bar = document.getElementById('progBar');
  bar.innerHTML = Array.from({ length: TOTAL_STEPS }, (_, i) =>
    `<div class="prog-seg ${i < S.step ? 'done' : i === S.step ? 'active' : ''}"></div>`
  ).join('');

  document.getElementById('btnPrev').style.display = S.step === 0 ? 'none' : '';
  document.getElementById('btnNext').textContent = S.step === TOTAL_STEPS - 1 ? '완료' : '다음 →';
  document.getElementById('btnNext').disabled = (S.step === 0 && !S.type);

  const body = document.getElementById('stepBody');
  const steps = [step0, step1, step2, step3, step4];
  steps[S.step](body);
  document.getElementById('surveyScroll').scrollTop = 0;
  draw();
}

function step0(el) {
  el.innerHTML = `
    <div class="step-label">STEP 1 / ${TOTAL_STEPS}</div>
    <div class="step-title">가구 종류를 선택하세요</div>
    <div class="type-grid">
      ${FTYPES.map(f => `
        <button class="type-card ${S.type === f.id ? 'sel' : ''}" onclick="selectType('${f.id}')">
          <div class="ico">${f.ico}</div>
          <div class="nm">${f.nm}</div>
          <div class="sub">${f.sub}</div>
        </button>
      `).join('')}
    </div>
  `;
}

function step1(el) {
  el.innerHTML = `
    <div class="step-label">STEP 2 / ${TOTAL_STEPS}</div>
    <div class="step-title">전체 크기를 입력하세요</div>
    ${mkSlider('w', '너비 (W)', 200, 2400)}
    ${mkSlider('h', '높이 (H)', 200, 2500)}
    ${mkSlider('d', '깊이 (D)', 100, 800)}
    <div id="sizeInfo" style="margin-top:4px;padding:8px 10px;background:#f0f8ff;border-radius:6px;font-size:11px;color:#555;font-weight:600">
      W ${S.w} × H ${S.h} × D ${S.d} mm
    </div>
  `;
}

function mkSlider(key, label, min, max) {
  return `
    <div class="field">
      <label>${label} <span class="unit">mm</span></label>
      <div class="field-row">
        <input id="sl_${key}" type="range" min="${min}" max="${max}" value="${S[key]}"
          oninput="syncSize('${key}', this.value)">
        <input id="nm_${key}" type="number" value="${S[key]}" min="${min}" max="${max}"
          oninput="syncSize('${key}', this.value)">
        <span class="unit">mm</span>
      </div>
    </div>
  `;
}

function step2(el) {
  ensureCols();
  el.innerHTML = `
    <div class="step-label">STEP 3 / ${TOTAL_STEPS}</div>
    <div class="step-title">칸 구성을 설정하세요</div>
    <div class="field" style="margin-bottom:18px">
      <label style="margin-bottom:8px">세로 칸 수 (열)</label>
      <div class="nbtn-row">
        ${[1,2,3,4].map(n =>
          `<button class="nbtn ${S.vCols === n ? 'sel' : ''}" onclick="setVCols(${n})">${n}</button>`
        ).join('')}
      </div>
    </div>
    <div id="colConfigs"></div>
  `;
  renderColConfigs();
}

function renderColConfigs() {
  ensureCols();
  const el = document.getElementById('colConfigs');
  if (!el) return;
  const LABELS = ['A', 'B', 'C', 'D'];
  el.innerHTML = S.cols.map((c, i) => {
    const hasShelf  = c.type === 'shelf'  || c.type === 'mixed';
    const hasDrawer = c.type === 'drawer' || c.type === 'mixed';
    return `
      <div class="col-card">
        <div class="col-card-title">${LABELS[i]}칸</div>
        <div class="ctype-row">
          ${['shelf','drawer','mixed','open'].map(t => `
            <button class="ctype-btn ${c.type === t ? 'sel' : ''}" onclick="setColType(${i},'${t}')">
              ${{shelf:'선반',drawer:'서랍',mixed:'혼합',open:'오픈'}[t]}
            </button>
          `).join('')}
        </div>
        ${(hasShelf || hasDrawer) ? `<div class="sub-field">
          ${hasShelf  ? `<label>선반 수: <input type="number" value="${c.shelves}" min="0" max="15"
              oninput="setColShelves(${i},this.value)"></label>` : ''}
          ${hasDrawer ? `<label>서랍 수: <input type="number" value="${c.drawers || 2}" min="1" max="12"
              oninput="setColDrawers(${i},this.value)"></label>` : ''}
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function step3(el) {
  el.innerHTML = `
    <div class="step-label">STEP 4 / ${TOTAL_STEPS}</div>
    <div class="step-title">문을 설정하세요</div>

    <div class="field">
      <label>문 유무</label>
      <div class="toggle-row">
        <button class="tbtn ${S.hasDoor ? 'sel' : ''}"  onclick="S.hasDoor=true; render()">문 있음</button>
        <button class="tbtn ${!S.hasDoor ? 'sel' : ''}" onclick="S.hasDoor=false; render()">오픈형 (문 없음)</button>
      </div>
    </div>

    ${S.hasDoor ? `
      <div class="field">
        <label>문 타입</label>
        <div class="toggle-row">
          <button class="tbtn ${S.doorType==='swing' ? 'sel':''}" onclick="S.doorType='swing'; render()">여닫이</button>
          <button class="tbtn ${S.doorType==='slide' ? 'sel':''}" onclick="S.doorType='slide'; render()">미닫이</button>
        </div>
      </div>
      <div class="field">
        <label>손잡이</label>
        <div class="toggle-row">
          <button class="tbtn ${S.handle==='bar'  ? 'sel':''}" onclick="S.handle='bar';  draw()">바형</button>
          <button class="tbtn ${S.handle==='knob' ? 'sel':''}" onclick="S.handle='knob'; draw()">원형</button>
          <button class="tbtn ${S.handle==='none' ? 'sel':''}" onclick="S.handle='none'; draw()">없음</button>
        </div>
      </div>
    ` : ''}
  `;
}

function step4(el) {
  const ft = FTYPES.find(f => f.id === S.type);
  const panelEst = 5 + S.cols.reduce((a,c)=> a + (c.shelves||0), 0)
                     + (S.hasDoor ? S.vCols * (S.doorType==='slide' ? 2 : 1) : 0);
  el.innerHTML = `
    <div class="step-label">STEP 5 / ${TOTAL_STEPS}</div>
    <div class="step-title">설계 완료 🎉</div>

    <div class="result-box">
      <div class="result-title">${ft ? ft.ico + ' ' + ft.nm : '가구'} 외형이 완성되었습니다</div>
      <div>
        <span class="tag">너비 ${S.w}mm</span>
        <span class="tag">높이 ${S.h}mm</span>
        <span class="tag">깊이 ${S.d}mm</span>
        <span class="tag">${S.vCols}칸</span>
        ${S.hasDoor
          ? `<span class="tag">${S.doorType === 'swing' ? '여닫이' : '미닫이'}문</span>`
          : '<span class="tag">오픈형</span>'}
      </div>
    </div>

    <div class="result-row">
      <div>• 예상 판재 수: <strong>${panelEst}개</strong></div>
      <div>• 다음 단계: 구멍 좌표 계산</div>
    </div>

    <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-next" onclick="alert('구멍 좌표 계산 기능과 연동 예정입니다.')">구멍 좌표 계산으로 →</button>
      <button class="btn-next" style="background:#2a9d8f" onclick="window.print()">인쇄 / 저장</button>
    </div>
  `;
}

function selectType(id) {
  const ft = FTYPES.find(f => f.id === id);
  S.type = id;
  S.w = ft.w; S.h = ft.h; S.d = ft.d;
  render();
}

// ── Canvas drawing ───────────────────────────────────
function draw() {
  const cvPanel = document.getElementById('cvPanel');
  const canvas  = document.getElementById('cv');
  const maxW = cvPanel.clientWidth  - 48;
  const maxH = cvPanel.clientHeight - 48;

  const PAD = 52;
  const sc  = Math.min((maxW - PAD*2) / S.w, (maxH - PAD*2) / S.h, 2);
  const fw  = S.w * sc;
  const fh  = S.h * sc;

  canvas.width  = fw + PAD*2;
  canvas.height = fh + PAD*2;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const ox = PAD, oy = PAD;
  const T  = Math.max(2, 18 * sc); // panel thickness in canvas px

  // ── Interior (shelves / drawers) ──────────────────
  const colW = fw / S.vCols;
  for (let ci = 0; ci < S.vCols; ci++) {
    const c    = S.cols[ci];
    const cx1  = ox + colW * ci;
    const cx2  = ox + colW * (ci + 1);
    const cy1  = oy + T;
    const cy2  = oy + fh - T;
    const iH   = cy2 - cy1;
    const iW   = cx2 - cx1;

    if (c.type === 'shelf' || c.type === 'open') {
      drawShelves(ctx, cx1, cy1, iW, iH, c.type === 'open' ? 0 : c.shelves);

    } else if (c.type === 'drawer') {
      drawDrawers(ctx, cx1, cy1, iW, iH, Math.max(1, c.drawers || 2), sc);

    } else if (c.type === 'mixed') {
      const splitY = cy1 + iH * 0.55;
      // divider line
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
      line(ctx, cx1, splitY, cx2, splitY);
      drawShelves(ctx, cx1, cy1, iW, splitY - cy1, c.shelves || 2);
      drawDrawers(ctx, cx1, splitY, iW, cy2 - splitY, Math.max(1, c.drawers || 2), sc);
    }
  }

  // ── Cabinet outline ───────────────────────────────
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(ox, oy, fw, fh);

  // top/bottom panel thickness lines
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2;
  line(ctx, ox, oy + T, ox + fw, oy + T);
  line(ctx, ox, oy + fh - T, ox + fw, oy + fh - T);

  // vertical dividers
  for (let i = 1; i < S.vCols; i++) {
    const x = ox + colW * i;
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    line(ctx, x, oy + T, x, oy + fh - T);
  }

  // ── Doors ────────────────────────────────────────
  if (S.hasDoor) {
    if (S.doorType === 'swing') {
      for (let ci = 0; ci < S.vCols; ci++) {
        const dx = ox + colW * ci;
        const dw = colW;
        const dh = fh;
        const ins = Math.max(6, 14 * sc);
        const isLeft = ci < S.vCols / 2;

        // door rectangle
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2.2;
        ctx.strokeRect(dx, oy, dw, dh);
        // inner panel line
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
        ctx.strokeRect(dx + ins, oy + ins, dw - ins*2, dh - ins*2);

        // hinge marks
        const hingeX = isLeft ? dx + 4 : dx + dw - 4;
        ctx.fillStyle = '#666';
        for (const hy of [oy + Math.min(80*sc, dh*0.1), oy + dh - Math.min(80*sc, dh*0.1)]) {
          ctx.beginPath(); ctx.arc(hingeX, hy, Math.max(2.5, 3*sc), 0, Math.PI*2); ctx.fill();
        }

        // handle
        if (S.handle !== 'none') {
          const hx = isLeft ? dx + dw - Math.max(12, 18*sc) : dx + Math.max(12, 18*sc);
          drawHandle(ctx, hx, oy + dh/2, sc);
        }
      }
    } else {
      // sliding doors
      const pW  = fw * 0.55;
      const ins = Math.max(5, 10 * sc);
      // front panel
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2.2;
      ctx.strokeRect(ox, oy, pW, fh);
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.strokeRect(ox + ins, oy + ins, pW - ins*2, fh - ins*2);
      // back panel
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2.2;
      ctx.strokeRect(ox + fw - pW, oy, pW, fh);
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.strokeRect(ox + fw - pW + ins, oy + ins, pW - ins*2, fh - ins*2);
      // overlap dashed lines
      ctx.setLineDash([5, 4]); ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
      line(ctx, ox + pW, oy, ox + pW, oy + fh);
      line(ctx, ox + fw - pW, oy, ox + fw - pW, oy + fh);
      ctx.setLineDash([]);
      // handles
      if (S.handle !== 'none') {
        drawHandle(ctx, ox + pW - Math.max(12, 16*sc), oy + fh/2, sc);
        drawHandle(ctx, ox + fw - pW + Math.max(12, 16*sc), oy + fh/2, sc);
      }
    }
  }

  // ── Dimensions ───────────────────────────────────
  const dimColor = '#4361ee';
  dimH(ctx, ox, oy + fh + 26, fw, `${S.w}mm`, dimColor, sc);
  dimV(ctx, ox + fw + 26, oy, fh, `${S.h}mm`, dimColor, sc);

  // depth label (top right)
  ctx.fillStyle = '#999';
  ctx.font = `${Math.max(9, Math.round(sc * 10))}px 'Malgun Gothic', sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(`D: ${S.d}mm`, canvas.width - 4, 14);

  // per-column width if multi-column
  if (S.vCols > 1) {
    ctx.fillStyle = '#888';
    ctx.font = `${Math.max(8, Math.round(sc * 9))}px 'Malgun Gothic', sans-serif`;
    ctx.textAlign = 'center';
    const colMm = Math.round(S.w / S.vCols);
    for (let ci = 0; ci < S.vCols; ci++) {
      ctx.fillText(`${colMm}`, ox + colW*(ci+0.5), oy + fh + 14);
    }
  }
}

// ── Drawing helpers ───────────────────────────────────
function line(ctx, x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}

function drawShelves(ctx, x, y, w, h, n) {
  n = Math.max(0, n);
  if (n === 0) return;
  const sp = h / (n + 1);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  for (let i = 1; i <= n; i++) {
    const sy = y + sp * i;
    line(ctx, x + 2, sy, x + w - 2, sy);
  }
}

function drawDrawers(ctx, x, y, w, h, n, sc) {
  const dh = h / n;
  for (let i = 0; i < n; i++) {
    const dy = y + dh * i;
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.strokeRect(x + 4, dy + 3, w - 8, dh - 6);
    drawHandle(ctx, x + w/2, dy + dh/2, sc);
  }
}

function drawHandle(ctx, x, y, sc) {
  ctx.strokeStyle = '#222'; ctx.fillStyle = '#222';
  ctx.lineWidth = Math.max(1.5, 2 * sc);
  if (S.handle === 'bar') {
    const hl = Math.max(8, 22 * sc);
    line(ctx, x, y - hl/2, x, y + hl/2);
  } else if (S.handle === 'knob') {
    ctx.beginPath();
    ctx.arc(x, y, Math.max(2.5, 3.5 * sc), 0, Math.PI*2);
    ctx.fill();
  }
}

function dimH(ctx, x, y, len, label, color, sc) {
  const AR = 5;
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1;
  line(ctx, x, y, x + len, y);
  // tick marks
  line(ctx, x, y-6, x, y+6);
  line(ctx, x+len, y-6, x+len, y+6);
  // arrows
  fillTri(ctx, x, y, AR, 'right');
  fillTri(ctx, x+len, y, AR, 'left');
  ctx.font = `bold ${Math.max(10,11)}px 'Malgun Gothic',sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(label, x + len/2, y - 6);
}

function dimV(ctx, x, y, len, label, color, sc) {
  const AR = 5;
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1;
  line(ctx, x, y, x, y + len);
  line(ctx, x-6, y, x+6, y);
  line(ctx, x-6, y+len, x+6, y+len);
  fillTri(ctx, x, y, AR, 'down');
  fillTri(ctx, x, y+len, AR, 'up');
  ctx.save();
  ctx.translate(x + 14, y + len/2);
  ctx.rotate(-Math.PI/2);
  ctx.font = `bold ${Math.max(10,11)}px 'Malgun Gothic',sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function fillTri(ctx, x, y, s, dir) {
  ctx.beginPath();
  if (dir === 'right') { ctx.moveTo(x+s,y); ctx.lineTo(x,y-s); ctx.lineTo(x,y+s); }
  if (dir === 'left')  { ctx.moveTo(x-s,y); ctx.lineTo(x,y-s); ctx.lineTo(x,y+s); }
  if (dir === 'down')  { ctx.moveTo(x,y+s); ctx.lineTo(x-s,y); ctx.lineTo(x+s,y); }
  if (dir === 'up')    { ctx.moveTo(x,y-s); ctx.lineTo(x-s,y); ctx.lineTo(x+s,y); }
  ctx.closePath(); ctx.fill();
}

// ── Init ──────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(draw, 80);
});

render();
</script>
</body>
</html>
