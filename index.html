<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가구 외형 설계</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f5f5f5; font-size: 14px; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100vh; }

.header {
  background: #1a1a2e; color: white;
  padding: 11px 20px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header span { font-size: 12px; color: #aaa; }
.version-badge { margin-left: auto; font-size: 11px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 2px 10px; color: #ccc; white-space: nowrap; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── Survey panel ── */
.survey { width: 360px; min-width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
.survey-scroll { flex: 1; overflow-y: auto; padding: 18px; }
.survey-nav { padding: 10px 14px; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0; }

.progress { display: flex; gap: 3px; margin-bottom: 14px; }
.prog-seg { flex: 1; height: 4px; border-radius: 2px; background: #e8e8e8; transition: background .25s; }
.prog-seg.done   { background: #2a9d8f; }
.prog-seg.active { background: #4361ee; }

.step-label { font-size: 11px; color: #888; margin-bottom: 3px; }
.step-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-card { border: 2px solid #e8e8e8; border-radius: 10px; padding: 12px 6px; cursor: pointer; text-align: center; background: white; transition: all .15s; font-family: inherit; }
.type-card:hover { border-color: #4361ee; background: #f4f6ff; }
.type-card.sel   { border-color: #4361ee; background: #eef0ff; }
.type-card .ico  { margin-bottom: 6px; display:flex; align-items:center; justify-content:center; height:38px; }
.type-card .ico svg { transition: stroke .15s; }
.type-card.sel .ico svg, .type-card:hover .ico svg { stroke: #4361ee; }
.type-card .nm   { font-size: 12px; font-weight: 700; }
.type-card .sub  { font-size: 10px; color: #999; margin-top: 2px; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
.field-row { display: flex; align-items: center; gap: 8px; }
.field-row input[type=range] { flex: 1; accent-color: #4361ee; margin-top: 4px; }
.field-row input[type=number] { width: 72px; padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; font-family: inherit; text-align: right; }
.field-row input:focus { outline: none; border-color: #4361ee; }

/* 샌드방향 아이콘 카드 */
.joint-section { margin-bottom: 18px; }
.joint-section-title { font-size: 12px; font-weight: 700; color: #444; margin-bottom: 8px; }
.joint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.joint-card {
  border: 2px solid #e0e0e0; border-radius: 10px;
  padding: 12px 8px 10px;
  background: white; cursor: pointer;
  text-align: center; font-family: inherit;
  transition: border-color .15s, color .15s, box-shadow .15s;
  color: #555;
}
.joint-card:hover { border-color: #a5b4fc; color: #4361ee; box-shadow: 0 2px 8px rgba(67,97,238,.1); }
.joint-card.sel  { border-color: #4361ee; color: #4361ee; box-shadow: 0 2px 12px rgba(67,97,238,.18); }
.joint-card svg  { display: block; margin: 0 auto 6px; }
.jc-label { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.jc-sub   { font-size: 10px; opacity: .7; }
.joint-summary {
  background: #f0f4ff; border-radius: 8px;
  padding: 9px 12px; font-size: 11px; color: #444; line-height: 1.9;
}

/* 외경 크기 입력 전용 */
.size-input-wrap { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.size-input-wrap label { font-size: 12px; color: #555; font-weight: 600; }
.size-input-row { display: flex; align-items: center; gap: 6px; }
.size-num {
  flex: 1; padding: 9px 12px;
  border: 1.5px solid #ccc; border-radius: 8px;
  font-size: 18px; font-weight: 700; font-family: inherit;
  text-align: center; color: #1a1a2e;
  transition: border-color .15s, box-shadow .15s;
  -moz-appearance: textfield;
}
.size-num::-webkit-inner-spin-button,
.size-num::-webkit-outer-spin-button { -webkit-appearance: none; }
.size-num:focus { outline: none; border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,.15); }
.size-num.changed { border-color: #2a9d8f; }
.step-btn {
  width: 34px; height: 42px; border: 1.5px solid #ddd; border-radius: 8px;
  background: white; font-size: 18px; color: #555; cursor: pointer;
  font-family: inherit; transition: all .12s; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-btn:hover { background: #eef0ff; border-color: #4361ee; color: #4361ee; }
.step-btn:active { transform: scale(.93); }
.size-slider { width: 100%; accent-color: #4361ee; }
.unit { font-size: 11px; color: #999; }

.size-summary { margin-top: 4px; padding: 7px 10px; background: #f0f8ff; border-radius: 6px; font-size: 11px; color: #555; font-weight: 600; }

/* thickness preset cards */
.thick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.thick-card { border: 2px solid #e8e8e8; border-radius: 8px; padding: 8px; cursor: pointer; text-align: center; background: white; transition: all .15s; font-family: inherit; }
.thick-card:hover { border-color: #4361ee; background: #f4f6ff; }
.thick-card.sel  { border-color: #4361ee; background: #eef0ff; }
.thick-card .tv  { font-size: 17px; font-weight: 700; color: #4361ee; }
.thick-card .tn  { font-size: 10px; color: #888; }

/* back thickness pill buttons */
.pill-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.pill-btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 20px; background: white; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
.pill-btn.sel { background: #4361ee; color: white; border-color: #4361ee; }

/* 후판 삽입(Dado) 설정 */
.dado-box { margin-top: 10px; background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 8px; padding: 10px 12px; }
.dado-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
.dado-item { background: white; border: 1px solid #e3e8ff; border-radius: 6px; padding: 8px 8px 6px; }
.dado-lbl { font-size: 11px; font-weight: 700; color: #4361ee; margin-bottom: 4px; }
.dado-row { display: flex; align-items: center; gap: 3px; }
.dado-num { width: 100%; padding: 5px 6px; border: 1.5px solid #ccc; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: inherit; text-align: center; color: #1a1a2e; -moz-appearance: textfield; }
.dado-num::-webkit-inner-spin-button, .dado-num::-webkit-outer-spin-button { -webkit-appearance: none; }
.dado-num:focus { outline: none; border-color: #4361ee; box-shadow: 0 0 0 2px rgba(67,97,238,.15); }
.dado-hint { font-size: 10px; color: #888; margin-top: 3px; text-align: center; }
.dado-note { font-size: 11px; color: #4361ee; margin-top: 8px; line-height: 1.7; }

.nbtn-row { display: flex; gap: 6px; }
.nbtn { width: 46px; height: 46px; border: 2px solid #e8e8e8; border-radius: 8px; background: white; font-size: 17px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
.nbtn.sel { border-color: #4361ee; background: #eef0ff; color: #4361ee; }
.nbtn:hover:not(.sel) { border-color: #4361ee; }

.col-card { background: #f8f9ff; border: 1px solid #e3e8ff; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
.col-card-title { font-size: 11px; font-weight: 700; color: #4361ee; margin-bottom: 7px; }
.ctype-row { display: flex; gap: 4px; }
.ctype-btn { flex: 1; padding: 5px 3px; border: 1px solid #ccc; border-radius: 6px; background: white; font-size: 11px; cursor: pointer; font-family: inherit; text-align: center; transition: all .15s; }
.ctype-btn.sel { background: #4361ee; color: white; border-color: #4361ee; }
.sub-field { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
.sub-field label { font-size: 11px; color: #555; }
.sub-field input[type=number] { width: 44px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 12px; font-family: inherit; margin-left: 4px; }

/* 고정형/이동형 선택 */
.fxadj-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; }
.fxadj-lbl { font-size: 11px; color: #666; white-space: nowrap; }
.fxadj-btn { padding: 3px 10px; border: 1px solid #ccc; border-radius: 14px; background: white; font-size: 11px; cursor: pointer; font-family: inherit; transition: all .13s; }
.fxadj-btn.sel  { background: #4361ee; color: white; border-color: #4361ee; }
.fxadj-btn.adj-sel { background: #0ea5e9; color: white; border-color: #0ea5e9; }
.div-type-section { background: #f8f9ff; border: 1px solid #e3e8ff; border-radius: 8px; padding: 9px 12px; margin-top: 4px; }
.div-type-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.div-type-row:last-child { margin-bottom: 0; }
/* 이동형 선반: 캔버스 범례 */
.canvas-legend { display: flex; gap: 12px; font-size: 10px; color: #888; padding: 4px 8px; background:#f9f9f9; border-top: 1px solid #eee; flex-shrink:0; }

.toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
.tbtn { flex: 1; padding: 9px 6px; border: 2px solid #e8e8e8; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; transition: all .15s; }
.tbtn.sel { border-color: #4361ee; background: #eef0ff; color: #4361ee; font-weight: 600; }

.btn-next { flex: 1; padding: 10px; background: #4361ee; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-next:disabled { background: #c5c5c5; cursor: default; }
.btn-prev { padding: 10px 14px; background: white; color: #4361ee; border: 2px solid #4361ee; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }

.tag { display: inline-block; padding: 2px 8px; background: #eef0ff; color: #4361ee; border-radius: 12px; font-size: 11px; margin: 2px; }
.result-box { background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 11px 13px; margin-bottom: 12px; }
.result-title { font-weight: 700; color: #166534; margin-bottom: 5px; font-size: 13px; }
.result-row { font-size: 12px; color: #444; line-height: 1.9; }

/* ── Right panel ── */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.tabs { display: flex; background: white; border-bottom: 1px solid #ddd; flex-shrink: 0; }
.tab-btn { padding: 10px 22px; border: none; background: none; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; font-family: inherit; border-bottom: 3px solid transparent; transition: all .15s; }
.tab-btn.active { color: #4361ee; border-bottom-color: #4361ee; }

.tab-pane { display: none; flex: 1; overflow: hidden; }
.tab-pane.active { display: flex; }

/* canvas tab */
.canvas-wrap { flex: 1; overflow: auto; background: #e8ecf0; display: flex; align-items: center; justify-content: center; padding: 24px; }
canvas#cv { background: white; box-shadow: 0 6px 24px rgba(0,0,0,.12); display: block; }

/* parts list tab */
.parts-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; background: #fafbff; }
.parts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.parts-header h2 { font-size: 14px; font-weight: 700; color: #1a1a2e; }

.assembly-note { background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #795548; margin-bottom: 12px; line-height: 1.7; }

table.parts { width: 100%; border-collapse: collapse; font-size: 13px; }
table.parts th { background: #1a1a2e; color: white; padding: 7px 10px; text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
table.parts td { padding: 6px 10px; border-bottom: 1px solid #eee; text-align: center; }
table.parts tr:hover td { background: #f0f4ff; }
table.parts .g-shelf  td { color: #166534; }
table.parts .g-door   td { color: #1d4ed8; }
table.parts .g-drawer td { color: #7e22ce; }
table.parts .g-div    td { color: #92400e; }
table.parts .g-total  td { background: #f0f4ff; font-weight: 700; border-top: 2px solid #4361ee; }

.dim-chip { display: inline-block; background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 5px; padding: 2px 8px; font-size: 12px; font-weight: 700; color: #3730a3; white-space: nowrap; }

.export-btn { padding: 6px 14px; background: white; color: #4361ee; border: 1px solid #4361ee; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
.export-btn:hover { background: #eef0ff; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="1" y="2" width="18" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
      <line x1="1" y1="7" x2="19" y2="7" stroke="white" stroke-width="1.5"/>
      <line x1="10" y1="7" x2="10" y2="16" stroke="white" stroke-width="1.5"/>
    </svg>
    <h1>가구 외형 설계</h1>
    <span>설문으로 가구 외형 및 자재 목록을 생성합니다</span>
    <span class="version-badge">v2.6.0</span>
  </div>

  <div class="main">
    <div class="survey">
      <div class="survey-scroll" id="surveyScroll">
        <div class="progress" id="progBar"></div>
        <div id="stepBody"></div>
      </div>
      <div class="survey-nav">
        <button class="btn-prev" id="btnPrev" onclick="prev()">← 이전</button>
        <button class="btn-next" id="btnNext" onclick="next()">다음 →</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="tabs">
        <button class="tab-btn active" id="tabDraw"  onclick="switchTab('draw')">📐 정면도</button>
        <button class="tab-btn"        id="tabParts" onclick="switchTab('parts')">📋 자재 목록</button>
      </div>

      <div class="tab-pane active" id="paneDraw">
        <div class="canvas-wrap" id="cvWrap">
          <canvas id="cv"></canvas>
        </div>
        <div class="canvas-legend">
          <span>■ <span style="background:#d8d8d8;padding:0 6px;border-radius:2px;font-size:10px">고정형</span></span>
          <span>■ <span style="background:#bde0f8;padding:0 6px;border-radius:2px;font-size:10px;color:#0369a1">이동형 (핀홀)</span></span>
          <span style="margin-left:auto;color:#4361ee;font-size:10px">● 클릭→선택  드래그→이동</span>
        </div>
        <!-- 선반 위치 입력 바 -->
        <div id="shelfPosBar" style="display:none;padding:7px 14px;background:#fff5f5;border-top:1.5px solid #fca5a5;align-items:center;gap:8px;flex-shrink:0;font-size:12px;">
          <span style="color:#e03333;font-weight:700;font-size:13px" id="shelfPosLabel">선반 1</span>
          <span style="color:#666">하단에서</span>
          <input id="shelfPosInput" type="number" min="0" step="1"
            style="width:72px;padding:4px 8px;border:1.5px solid #e03333;border-radius:6px;font-size:15px;font-weight:700;text-align:center;font-family:inherit;color:#1a1a2e;-moz-appearance:textfield;"
            oninput="applyShelfPosInput(this.value)"
            onchange="applyShelfPosInput(this.value)">
          <span style="color:#666">mm</span>
          <div style="display:flex;gap:3px;margin-left:4px">
            <button onclick="nudgeShelf(-10)" style="padding:3px 7px;border:1px solid #ccc;border-radius:5px;background:white;font-size:11px;cursor:pointer;font-family:inherit">−10</button>
            <button onclick="nudgeShelf(-1)"  style="padding:3px 7px;border:1px solid #ccc;border-radius:5px;background:white;font-size:11px;cursor:pointer;font-family:inherit">−1</button>
            <button onclick="nudgeShelf(+1)"  style="padding:3px 7px;border:1px solid #ccc;border-radius:5px;background:white;font-size:11px;cursor:pointer;font-family:inherit">+1</button>
            <button onclick="nudgeShelf(+10)" style="padding:3px 7px;border:1px solid #ccc;border-radius:5px;background:white;font-size:11px;cursor:pointer;font-family:inherit">+10</button>
          </div>
          <span id="shelfPosRange" style="margin-left:auto;color:#aaa;font-size:11px"></span>
        </div>
      </div>

      <div class="tab-pane" id="paneParts">
        <div class="parts-wrap">
          <div class="parts-header">
            <h2>자재 재단 목록</h2>
            <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
          </div>
          <div class="assembly-note" id="assemblyNote"></div>
          <table class="parts">
            <thead>
              <tr>
                <th>#</th><th>부재명</th><th>수량</th>
                <th>가로 (mm)</th><th>세로 (mm)</th><th>두께 (mm)</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="partsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────
const S = {
  step: 0,
  type: null,
  w: 900, h: 1800, d: 580,
  T: 18,      // 본체 자재 두께
  backT: 9,   // 후판 두께
  vCols: 1,
  cols: [{ type:'shelf', shelves:3, drawers:0 }],
  topJoint:    'between', // 'between'=상판 끼움 | 'over'=상판 올라탐
  bottomJoint: 'between', // 'between'=지판 끼움 | 'under'=지판 아래
  vDivPos: [],     // 수직 칸막이 위치 (내부 폭 비율 0~1)
  vDivTypes: [],   // 수직 칸막이 고정/이동형 ('fixed'|'adj')
  topPanelPos: 0,  // 끼움형 상판 아래 이동 비율 (0=최상단, sideH 기준)
  botPanelPos: 0,  // 끼움형 지판 위 이동 비율 (0=최하단)
  backJoint: 'nail', // 'nail'=나사고정 | 'dado'=홈 삽입
  dadoW: 9,          // 삽입 홈 너비 (mm, 후판 두께와 일치)
  dadoD: 10,         // 삽입 홈 깊이 (mm)
  dadoPos: 12,       // 배면에서 홈 앞날까지의 거리 (mm)
  hasDoor: true,
  doorType: 'swing',
  handle: 'bar'
};

const TOTAL = 6;

const FTYPES = [
  { id:'wardrobe', nm:'옷장 / 장롱', sub:'양문형·미닫이', w:1200,h:2000,d:580, ico:`
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="30" height="32" rx="1.5"/>
      <line x1="19" y1="3" x2="19" y2="35"/>
      <line x1="4" y1="9" x2="34" y2="9"/>
      <line x1="14" y1="20" x2="17" y2="20"/>
      <line x1="21" y1="20" x2="24" y2="20"/>
      <line x1="8"  y1="13" x2="16" y2="13"/>
      <line x1="22" y1="13" x2="30" y2="13"/>
    </svg>`},
  { id:'bookcase', nm:'책장', sub:'오픈 선반', w:900,h:1800,d:350, ico:`
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="30" height="32" rx="1.5"/>
      <line x1="4" y1="14" x2="34" y2="14"/>
      <line x1="4" y1="25" x2="34" y2="25"/>
      <line x1="10" y1="5"  x2="10" y2="14"/>
      <line x1="16" y1="5"  x2="16" y2="14"/>
      <line x1="22" y1="5"  x2="22" y2="14"/>
      <line x1="10" y1="16" x2="10" y2="25"/>
      <line x1="17" y1="16" x2="17" y2="25"/>
      <line x1="23" y1="16" x2="23" y2="25"/>
    </svg>`},
  { id:'drawer', nm:'서랍장', sub:'다단 서랍', w:800,h:900,d:450, ico:`

function syncSize(key, raw) {
  const v=parseInt(raw); if(isNaN(v)) return;
  S[key]=v;
  const sl=document.getElementById('sl_'+key); const nm=document.getElementById('nm_'+key);

  draw(); if(document.getElementById('paneParts').classList.contains('active')) renderParts();
}
function sizeStr(){
  const dado = S.backJoint==='dado'
    ? `  ┃  홈 W${S.dadoW}×D${S.dadoD} @${S.dadoPos}mm` : '';
  return `W ${S.w} × H ${S.h} × D ${S.d} mm  |  두께 ${S.T}mm / 후판 ${S.backT}mm${dado}`;
}
function dadoNoteStr(){
  const {w:W,h:H,d:D,T,dadoW,dadoD,dadoPos,backT} = S;
  const bW_base = (W-2*T) + 2*dadoD;
  const bH_base = (H-2*T) + 2*dadoD;
  const bW = bW_base - 2;
  const bH = bH_base - 2;
  const shelfD = D - dadoPos - dadoW;
  const warn  = dadoD > T/2   ? ` ⚠ 홈 깊이 T÷2(${Math.round(T/2)}mm) 초과` : '';
  const warnW = dadoW !== backT ? ` ⚠ 홈 너비(${dadoW})≠후판두께(${backT})` : '';
  const warnS = shelfD <= 0   ? ` ⚠ 배면여백+홈폭이 D를 초과!` : '';
  return `후판 재단: <b>${bW} × ${bH}mm</b>  <span style="color:#888;font-weight:400">(${bW_base}×${bH_base} − 조립여유2mm)</span><br>` +
    `<b>선반·칸막이·서랍 유효 깊이: D(${D}) − ${dadoPos} − ${dadoW} = <span style="color:#e03">${shelfD}mm</span></b>` +
    `${warn}${warnW}${warnS}`;
}
function svgDadoDiagram(){
  const {T, dadoW, dadoD, dadoPos} = S;
  const svgW=270, svgH=158;
  const ML=14, MR=52, MT=28, MB=36;
  const drawW=svgW-ML-MR, drawH=svgH-MT-MB;
  const extra=Math.max(20, Math.round(dadoPos*0.6));
  const totalMm=dadoPos+dadoW+extra;
  const scX=drawW/totalMm;
  const scY=drawH/Math.max(T,1);
  const px0=ML, py0=MT, pw=drawW, ph=drawH;
  const gx1=px0+dadoPos*scX;
  const gx2=px0+(dadoPos+dadoW)*scX;
  const gdepth=Math.max(dadoD*scY, 16);
  const gy1=py0+ph-gdepth, gy2=py0+ph;
  const R='#e03333';
  const fa=`font-size="10" font-weight="700" font-family="'Malgun Gothic',sans-serif" fill="${R}"`;
  const ext=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${R}" stroke-width="1" stroke-dasharray="2.5,2" opacity="0.7"/>`;
  const arr=(x1,y1,x2,y2)=>`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${R}" stroke-width="1.5" marker-start="url(#da)" marker-end="url(#da)"/>`;
  const bp_y=py0+ph+16, aw_y=py0-14, ad_x=gx2+14;
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="da" markerWidth="7" markerHeight="7" refX="6.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,0.5 L6.5,3.5 L0,6.5 Z" fill="${R}"/>
    </marker>
    <pattern id="wd" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#ddd4c0"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#b09060" stroke-width="1.7"/>
    </pattern>
  </defs>
  <rect x="${px0}" y="${py0}" width="${pw}" height="${ph}" fill="url(#wd)" stroke="#888" stroke-width="1.5"/>
  <rect x="${gx1.toFixed(1)}" y="${gy1.toFixed(1)}" width="${Math.max(gx2-gx1,3).toFixed(1)}" height="${gdepth.toFixed(1)}" fill="white" stroke="#555" stroke-width="1"/>
  <line x1="${px0}" y1="${py0}" x2="${px0}" y2="${py0+ph}" stroke="#222" stroke-width="3"/>
  ${ext(px0,py0+ph+2,px0,bp_y+2)}
  ${ext(gx1.toFixed(1),py0+ph+2,gx1.toFixed(1),bp_y+2)}
  ${arr(px0+3,bp_y,gx1-3,bp_y)}
  <text x="${((px0+gx1)/2).toFixed(1)}" y="${bp_y+13}" text-anchor="middle" ${fa}>${dadoPos}mm</text>
  ${ext(gx1.toFixed(1),py0-2,gx1.toFixed(1),aw_y-2)}
  ${ext(gx2.toFixed(1),py0-2,gx2.toFixed(1),aw_y-2)}
  ${arr(gx1+3,aw_y,gx2-3,aw_y)}
  <text x="${((gx1+gx2)/2).toFixed(1)}" y="${aw_y-4}" text-anchor="middle" ${fa}>${dadoW}mm</text>
  ${ext((gx2+2).toFixed(1),gy1.toFixed(1),(ad_x+2).toFixed(1),gy1.toFixed(1))}
  ${ext((gx2+2).toFixed(1),gy2.toFixed(1),(ad_x+2).toFixed(1),gy2.toFixed(1))}
  ${arr(ad_x,gy1+3,ad_x,gy2-3)}
  <text x="${ad_x+7}" y="${((gy1+gy2)/2+4).toFixed(1)}" text-anchor="start" ${fa}>${dadoD}mm</text>
  </svg>`;
}

function ensureCols() {
  while(S.cols.length<S.vCols) S.cols.push({type:'shelf',shelves:3,drawers:0});
  S.cols.length=S.vCols;
  // 각 칸의 선반 위치 비율 초기화 (shelfPos: 칸 내부 높이에서 선반 중심의 비율)
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    const n=(c.type==='shelf'||c.type==='mixed')?(c.shelves||0):0;
    if(!c.shelfPos||c.shelfPos.length!==n)
      c.shelfPos=Array.from({length:n},(_,i)=>(i+1)/(n+1));
  }
  // 수직 칸막이 위치·타입 초기화
  const nDiv=S.vCols-1;
  if(!S.vDivPos||S.vDivPos.length!==nDiv)
    S.vDivPos=Array.from({length:nDiv},(_,i)=>(i+1)/S.vCols);
  if(!S.vDivTypes||S.vDivTypes.length!==nDiv)
    S.vDivTypes=Array.from({length:nDiv},()=>'fixed');
  // 각 칸 선반 타입 배열 초기화 (선반별 개별 고정/이동형)
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    const n=(c.type==='shelf'||c.type==='mixed')?(c.shelves||0):0;
    const def=c.shelfType||'fixed'; // 기존 단일 타입 호환
    if(!c.shelfTypes||c.shelfTypes.length!==n)
      c.shelfTypes=Array.from({length:n},()=>def);
  }
}
function setVCols(n) { S.vCols=n; S.vDivPos=[]; S.vDivTypes=[]; ensureCols(); render(); }
function setColType(i,t) {
  S.cols[i].type=t;
  if(t==='drawer'&&!S.cols[i].drawers) S.cols[i].drawers=3;
  if(t==='mixed'){S.cols[i].shelves=S.cols[i].shelves||2;S.cols[i].drawers=S.cols[i].drawers||2;}
  const n=(t==='shelf'||t==='mixed')?(S.cols[i].shelves||0):0;
  S.cols[i].shelfPos=Array.from({length:n},(_,j)=>(j+1)/(n+1));
  S.cols[i].shelfTypes=Array.from({length:n},()=>'fixed');
  renderColConfigs(); draw();
  if(document.getElementById('paneParts').classList.contains('active')) renderParts();
}
function setColShelves(i,v){
  const n=parseInt(v)||0;
  const prev=S.cols[i].shelfTypes||[];
  S.cols[i].shelves=n;
  S.cols[i].shelfPos=Array.from({length:n},(_,j)=>(j+1)/(n+1));
  // 기존 타입 유지, 새 선반은 기본 고정형
  S.cols[i].shelfTypes=Array.from({length:n},(_,j)=>prev[j]||'fixed');
  renderColConfigs(); draw();
  if(document.getElementById('paneParts').classList.contains('active'))renderParts();
}
function toggleShelfType(ci,si){
  const c=S.cols[ci];
  if(!c.shelfTypes||si>=c.shelfTypes.length) return;
  c.shelfTypes[si]=c.shelfTypes[si]==='fixed'?'adj':'fixed';

function mkSlider(key, label, min, max) {
  const step = key==='d' ? 5 : 10;
  return `<div class="size-input-wrap">
    <label>${label} <span class="unit" style="font-weight:400">mm</span></label>
    <div class="size-input-row">

      <input id="nm_${key}" class="size-num" type="number" value="${S[key]}" min="${min}" max="${max}"
        onfocus="this.select()"
        oninput="syncSize('${key}',this.value)"
        onchange="syncSize('${key}',this.value)"
        onkeydown="if(event.key==='Enter'){this.blur();syncSize('${key}',this.value);}">
      <button class="step-btn" onmousedown="startStep('${key}',${step},event)" onmouseup="stopStep()" onmouseleave="stopStep()">+</button>
    </div>
    <input id="sl_${key}" class="size-slider" type="range" min="${min}" max="${max}" value="${S[key]}"
      oninput="syncSize('${key}',this.value)">
  </div>`;
}

let _stepTimer=null, _stepRAF=null;
function startStep(key, delta, e) {
  e.preventDefault();
  function doStep(){
    const nm=document.getElementById('nm_'+key);
    const min=parseInt(nm.min), max=parseInt(nm.max);
    const v=Math.min(max, Math.max(min, (parseInt(nm.value)||S[key]) + delta));
    syncSize(key, v);
    nm.classList.add('changed');
    setTimeout(()=>nm.classList.remove('changed'),200);
  }
  doStep();
  _stepTimer=setTimeout(()=>{
    function loop(){ doStep(); _stepRAF=requestAnimationFrame(loop); }
    loop();
  }, 400);
}
function stopStep(){
  clearTimeout(_stepTimer); _stepTimer=null;
  if(_stepRAF){ cancelAnimationFrame(_stepRAF); _stepRAF=null; }
}

function svgJointIcon(pos, type) {
  const W=110, H=76, T=11;
  const sx=8, ex=W-8-T;          // 좌·우 측판 x
  const topY=6, botY=H-6-T;      // 상판·지판 y

  // 측판 높이 범위
  let sy1, sy2;
  if (pos==='top') {
    sy1 = type==='over'  ? topY+T : topY;
    sy2 = H-6;
  } else {
    sy1 = 6;
    sy2 = type==='under' ? botY   : H-6;
  }

  // 수평 패널 x 범위
  const isSpanning = (pos==='top' && type==='over') || (pos==='bottom' && type==='under');
  const hx = isSpanning ? sx      : sx+T;
  const hw = isSpanning ? ex+T-sx : ex-sx-T;
  const hy = pos==='top' ? topY   : botY;

  // 측판 stroke (보조 — 가는 선)
  const ss = `fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"`;
  // 수평 패널 stroke (주요 — 굵은 선)
  const ps = `fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"`;

  let d='';
  // 좌측판
  d+=`<rect x="${sx}"  y="${sy1}" width="${T}" height="${sy2-sy1}" ${ss}/>`;
  // 우측판
  d+=`<rect x="${ex}"  y="${sy1}" width="${T}" height="${sy2-sy1}" ${ss}/>`;
  // 수평 패널 (상판 or 지판) — 강조
  d+=`<rect x="${hx}" y="${hy}" width="${hw}" height="${T}" ${ps}/>`;

  // 내부 구분선 힌트 (공간감)
  if (pos==='top') {
    d+=`<line x1="${sx+T}" y1="${hy+T+8}" x2="${ex}" y2="${hy+T+8}" stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
    d+=`<line x1="${sx+T}" y1="${hy+T+20}" x2="${ex}" y2="${hy+T+20}" stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
  } else {
    d+=`<line x1="${sx+T}" y1="${hy-8}"  x2="${ex}" y2="${hy-8}"  stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
    d+=`<line x1="${sx+T}" y1="${hy-20}" x2="${ex}" y2="${hy-20}" stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
  }

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${d}</svg>`;
}

function jointSummary() {
  const {w:W, h:H, T, topJoint, bottomJoint} = S;
  const sideH = H - (topJoint==='over'?T:0) - (bottomJoint==='under'?T:0);

}

// ── Parts calculation ─────────────────────────────────
function calcParts() {
  const {w:W, h:H, d:D, T, backT, vCols, cols, hasDoor, doorType, topJoint, bottomJoint,
         backJoint, dadoW, dadoD, dadoPos} = S;
  const r = v => Math.round(v * 10) / 10;
  const isDado = backJoint === 'dado';
  const dadoSpec = isDado ? `  [홈 W${dadoW}×D${dadoD} @${dadoPos}mm배면]` : '';

  // ── 샌드방향에 따른 치수 계산 ─────────────────────
  // 측판 높이: 올라탐/아래형일 때 해당 방향으로 T만큼 감소
  const sideH  = H - (topJoint==='over'    ? T : 0)
                   - (bottomJoint==='under' ? T : 0);
  // 상판 폭: 끼움=W-2T, 올라탐=W
  const topW   = topJoint==='over'    ? W       : W - 2*T;
  // 하판 폭: 끼움=W-2T, 아래=W
  const botW   = bottomJoint==='under'? W       : W - 2*T;
  // 내부 폭 (선반·칸막이): 항상 W-2T
  const innerW = W - 2*T;
  // 내부 높이: 항상 H-2T (상하판 두께 제외)
  const innerH = H - 2*T;
  const colInnerW = r((innerW - (vCols-1)*T) / vCols);

  const topNote    = topJoint==='over'
    ? `올라탐형: W전체(${W})`
    : `끼움형: W(${W})-측판2×T(${2*T}) = ${topW}`;
  const botNote    = bottomJoint==='under'
    ? `아래형: W전체(${W})`
    : `끼움형: W(${W})-측판2×T(${2*T}) = ${botW}`;
  const sideNote   = `H(${H})${topJoint==='over'?`-상판T(${T})`:''}${bottomJoint==='under'?`-지판T(${T})`:''} = ${sideH}`;

  const parts = [];

  // 1. 측판
  parts.push({ g:'box', name:'측판', qty:2,
    w: D, h: r(sideH), t: T, note: sideNote + dadoSpec });

  // 2. 상판
  parts.push({ g:'box', name:'상판', qty:1,
    w: r(topW), h: D, t: T, note: topNote + dadoSpec });

  // 3. 하판(지판)
  parts.push({ g:'box', name:'지판 (하판)', qty:1,
    w: r(botW), h: D, t: T, note: botNote + dadoSpec });

  // 4. 후판 (dado 모드: 홈 깊이만큼 폭·높이 증가, 조립 여유 각 -2mm)
  const backW_base = isDado ? r(innerW + 2*dadoD) : r(innerW);
  const backH_base = isDado ? r(innerH + 2*dadoD) : r(innerH);
  const backW = backW_base - 2;
  const backH = backH_base - 2;
  const backNote = isDado
    ? `홈 삽입: 유효면+삽입부 ${backW_base}×${backH_base} → 조립여유(-2) → ${backW}×${backH}`
    : `내부면 ${backW_base}×${backH_base} → 조립여유(-2) → ${backW}×${backH}`;
  parts.push({ g:'box', name:'후판', qty:1,
    w: backW, h: backH, t: backT, note: backNote });

  // ── 내부 부재 유효 깊이 (후판 앞면까지의 거리) ──────────
  // 나사 고정: 후판이 배면에 밀착 → 유효깊이 = D - backT
  // 홈 삽입:   후판이 dadoPos+dadoW 위치에 있음 → 유효깊이 = D - dadoPos - dadoW
  const innerD = isDado ? r(D - dadoPos - dadoW) : r(D - backT);
  const innerDNote = isDado
    ? `D(${D}) - 배면여백(${dadoPos}) - 홈폭(${dadoW}) = ${innerD}`
    : `D(${D}) - 후판(${backT}) = ${innerD}`;

  // 5. 수직 칸막이
  if (vCols > 1) {
    for(let di=0; di<vCols-1; di++){
      const dvt = (S.vDivTypes||[])[di]==='adj' ? '  [이동형-선반핀]' : '  [고정형]';
      const divNote = isDado
        ? `${innerDNote}  [배면 홈 W${dadoW}×D${dadoD}]${dvt}`
        : `깊이(${D}) - 후판(${backT}) = ${innerD}${dvt}`;
      parts.push({ g:'div', name:`수직 칸막이${vCols>2?` ${di+1}`:''}`, qty:1,
        w: innerD, h: r(innerH), t: T, note: divNote });
    }
  }

  // 6. 칸별 부재
  const LBL = ['A','B','C','D'];
  for (let ci=0; ci<vCols; ci++) {
    const c   = cols[ci];
    const lbl = vCols>1 ? ` (${LBL[ci]}칸)` : '';
    const cW  = colInnerW;
    const cH  = r(innerH);

    const _stypes=c.shelfTypes||[];
    const _nAdj=_stypes.filter(t=>t==='adj').length;
    const _nFixed=_stypes.length-_nAdj;
    const stNote=_stypes.length===0?'':_nAdj===0?'  [전체 고정형]':_nFixed===0?'  [전체 이동형-선반핀]':`  [고정형×${_nFixed} / 이동형×${_nAdj}]`;
    if (c.type === 'shelf') {
      const n = c.shelves||0;
      if (n>0)
        parts.push({ g:'shelf', name:`선반${lbl}`, qty:n,
          w: cW, h: innerD, t: T,
          note:`칸 내부폭 ${cW} × 유효깊이(${innerDNote})${stNote}` });

    } else if (c.type === 'drawer') {
      const n   = Math.max(1, c.drawers||2);
      const dFH = r(innerH/n - 4);
      const dBH = r(dFH - T);
      const dBW = r(innerD - T - 20); // 서랍 박스 깊이: 유효깊이 - 전면판T - 레일여유
      parts.push({ g:'drawer', name:`서랍 전면판${lbl}`, qty:n,
        w: cW, h: dFH, t: T,
        note:`${n}단 균등: (${cH}÷${n}) - 4mm 갭` });
      parts.push({ g:'drawer', name:`서랍 측판${lbl}`, qty:n*2,
        w: dBW, h: dBH, t: T,
        note:`유효깊이(${innerD})-T(${T})-레일20 = ${dBW}` });
      parts.push({ g:'drawer', name:`서랍 앞·뒷판${lbl}`, qty:n*2,
        w: r(cW - 2*T), h: dBH, t: T,
        note:`칸폭(${cW})-T×2(${2*T}) = ${r(cW-2*T)}` });
      parts.push({ g:'drawer', name:`서랍 바닥판${lbl}`, qty:n,
        w: r(cW - 2*T), h: dBW, t: backT,
        note:`후판 두께(${backT}) 사용` });

    } else if (c.type === 'mixed') {
      const topH  = r(cH * 0.55);
      const botH  = r(cH - topH);
      // 구분판
      parts.push({ g:'div', name:`혼합 구분판${lbl}`, qty:1,
        w: cW, h: innerD, t: T,
        note:`선반/서랍 경계  유효깊이(${innerDNote})` });
      // 선반
      const ns = c.shelves||2;
      if (ns>0)
        parts.push({ g:'shelf', name:`선반${lbl}`, qty:ns,
          w: cW, h: innerD, t: T,
          note:`상단 ${topH}mm 영역  유효깊이(${innerDNote})${stNote||''}` });
      // 서랍 박스
      const nd   = Math.max(1, c.drawers||2);
      const dFH2 = r(botH/nd - 4);
      const dBH2 = r(dFH2 - T);
      const dBW2 = r(innerD - T - 20);
      parts.push({ g:'drawer', name:`서랍 전면판${lbl}`, qty:nd,
        w: cW, h: dFH2, t: T,
        note:`하단 ${botH}mm, ${nd}단` });
      parts.push({ g:'drawer', name:`서랍 측판${lbl}`, qty:nd*2,
        w: dBW2, h: dBH2, t: T,
        note:`유효깊이(${innerD})-T(${T})-레일20 = ${dBW2}` });
      parts.push({ g:'drawer', name:`서랍 앞·뒷판${lbl}`, qty:nd*2,
        w: r(cW - 2*T), h: dBH2, t: T,
        note:`서랍 박스 앞뒤` });
      parts.push({ g:'drawer', name:`서랍 바닥판${lbl}`, qty:nd,
        w: r(cW - 2*T), h: dBW2, t: backT,
        note:`얇은 판재 사용` });
    }
    // open: no additional parts
  }

  // 7. 문
  if (hasDoor) {
    if (doorType==='swing') {
      const doorW = r(W / vCols);
      parts.push({ g:'door', name:'문 (여닫이)', qty:vCols,
        w: doorW, h: H, t: T,
        note:`W÷칸수 = ${doorW} (풀오버레이)` });
    } else {
      const slideW = r(W * 0.55);
      parts.push({ g:'door', name:'문 (미닫이)', qty:2,
        w: slideW, h: H, t: T,
        note:`W×55% = ${slideW} (오버랩)` });
    }
  }

  return parts;
}

// ── Render parts table ────────────────────────────────
function renderParts() {
  const {w:W, h:H, d:D, T, backT, vCols} = S;
  const parts = calcParts();

  const colInnerW = Math.round(((W-2*T-(vCols-1)*T)/vCols)*10)/10;
  const {topJoint, bottomJoint} = S;
  const sideHd = H - (topJoint==='over'?T:0) - (bottomJoint==='under'?T:0);
  const topWd  = topJoint==='over'    ? W : W-2*T;
  const botWd  = bottomJoint==='under'? W : W-2*T;
  const isDadoR = S.backJoint === 'dado';
  const {dadoW:dW, dadoD:dD, dadoPos:dP} = S;
  const backWr = (isDadoR ? (W-2*T)+2*dD : W-2*T) - 2;
  const backHr = (isDadoR ? (H-2*T)+2*dD : H-2*T) - 2;
  document.getElementById('assemblyNote').innerHTML =
    `<strong>샌드방향:</strong>
     상판 <b>${topJoint==='over'?'올라탐형':'끼움형'}</b> &nbsp;|&nbsp;
     지판 <b>${bottomJoint==='under'?'아래형':'끼움형'}</b><br>
     측판: ${D} × <b>${sideHd}</b> × T${T} &nbsp;|&nbsp;
     상판: <b>${topWd}</b> × ${D} × T${T} &nbsp;|&nbsp;
     지판: <b>${botWd}</b> × ${D} × T${T} &nbsp;|&nbsp;
     후판: <b>${backWr} × ${backHr}</b> × T${backT}<br>
     칸 내부 폭 = (${W} − 2×${T}${vCols>1?` − ${vCols-1}×${T}`:''}) ÷ ${vCols}
     = <strong>${colInnerW}mm</strong>
     ${isDadoR?`<br><span style="color:#4361ee">▪ 후판 홈 삽입: W${dW}×D${dD} @배면${dP}mm — 선반·칸막이·서랍 유효깊이 = ${D}-${dP}-${dW} = <b>${D-dP-dW}mm</b></span>`:''}
    `;

  const GCLS = {box:'',shelf:'g-shelf',door:'g-door',drawer:'g-drawer',div:'g-div'};
  let totalQty=0;
  document.getElementById('partsBody').innerHTML =
    parts.map((p,i)=>{
      totalQty+=p.qty;
      return `<tr class="${GCLS[p.g]||''}">
        <td>${i+1}</td>
        <td style="text-align:left;font-weight:600">${p.name}</td>
        <td><strong>${p.qty}</strong></td>
        <td><span class="dim-chip">${f(p.w)}</span></td>
        <td><span class="dim-chip">${f(p.h)}</span></td>
        <td>${p.t}</td>
        <td style="font-size:11px;color:#888;text-align:left">${p.note}</td>
      </tr>`;
    }).join('')
    + `<tr class="g-total">
        <td colspan="2">합 계</td>
        <td>${totalQty}</td>
        <td colspan="4" style="text-align:left;font-size:11px">
          총 ${parts.length}종 ${totalQty}개
        </td>
       </tr>`;
}

function f(v) { return Number.isInteger(v) ? v : v.toFixed(1); }

// ── CSV Export ────────────────────────────────────────
function exportCSV() {
  const {w,h,d,T,backT}=S;
  const parts=calcParts();
  let csv=`가구 자재 재단 목록\nW=${w} H=${h} D=${d} 본체두께=${T}mm 후판두께=${backT}mm\n\n`;
  csv+='번호,부재명,수량,가로(mm),세로(mm),두께(mm),비고\n';
  parts.forEach((p,i)=>{csv+=`${i+1},${p.name},${p.qty},${f(p.w)},${f(p.h)},${p.t},${p.note}\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`자재목록_W${w}xH${h}xD${d}_T${T}.csv`;
  a.click();
}

// ── Canvas drawing ────────────────────────────────────
function draw() {
  if(!document.getElementById('paneDraw').classList.contains('active')) return;
  const wrap=document.getElementById('cvWrap');
  const canvas=document.getElementById('cv');
  const PAD=52;
  const sc=Math.min((wrap.clientWidth-48-PAD*2)/S.w,(wrap.clientHeight-48-PAD*2)/S.h,2);
  const fw=S.w*sc, fh=S.h*sc;
  canvas.width=fw+PAD*2; canvas.height=fh+PAD*2;

  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);

  const ox=PAD, oy=PAD;
  const Tpx=S.T*sc;

  // ── 샌드방향에 따른 측판·상판·지판 위치 계산 ─────────
  const topOver  = S.topJoint    === 'over';
  const botUnder = S.bottomJoint === 'under';
  const sideY1   = oy + (topOver  ? Tpx : 0);
  const sideY2   = oy + fh - (botUnder ? Tpx : 0);
  const sideHpx  = sideY2 - sideY1;
  const topX     = topOver  ? ox      : ox + Tpx;
  const topW_px  = topOver  ? fw      : fw - 2*Tpx;
  const botX     = botUnder ? ox      : ox + Tpx;
  const botW_px  = botUnder ? fw      : fw - 2*Tpx;

  // ── 끼움형 상판/지판 위치 오프셋 (드래그 이동) ────────
  const topOffPx = (S.topJoint==='between') ? (S.topPanelPos||0)*sideHpx : 0;
  const botOffPx = (S.bottomJoint==='between') ? (S.botPanelPos||0)*sideHpx : 0;
  const topPanelY = oy + topOffPx;              // 상판 윗면 y
  const botPanelY = oy + fh - Tpx - botOffPx;  // 지판 윗면 y

  // ── 내부 영역 픽셀 좌표 (오프셋 반영) ────────────────
  const innerXstart = ox + Tpx;
  const innerXend   = ox + fw - Tpx;
  const innerWpx    = innerXend - innerXstart;
  const cy1 = topPanelY + Tpx;   // 상판 아랫면 y
  const cy2 = botPanelY;          // 지판 윗면 y
  const iH  = cy2 - cy1;

  // ── 수직 칸막이 중심 위치 (vDivPos 비율 → 픽셀) ───────
  ensureCols();
  const divCenters = (S.vDivPos||[]).map(f => innerXstart + f * innerWpx);

  // ── 열(column) 픽셀 경계 ────────────────────────────
  const colBounds = [];
  for(let ci=0;ci<S.vCols;ci++){
    const cx1 = ci===0          ? innerXstart          : divCenters[ci-1] + Tpx/2;
    const cx2 = ci===S.vCols-1 ? innerXend             : divCenters[ci]   - Tpx/2;
    colBounds.push({cx1, cx2});
  }

  // ── 마우스 인터랙션용 좌표 상태 저장 ─────────────────
  _cs = {ox, oy, sc, fw, fh, Tpx, innerXstart, innerXend, innerWpx,
         colBounds, cy1, cy2, sideHpx, topPanelY, botPanelY,
         topX, topW_px, botX, botW_px};

  // ── 상판 ────────────────────────────────────────────
  const isSelTop = _sel && _sel.type==='topPanel';
  ctx.fillStyle = isSelTop ? '#bfdbfe' : '#d8d8d8';
  ctx.fillRect(topX, topPanelY, topW_px, Tpx);
  ctx.strokeStyle = isSelTop ? '#4361ee' : '#555';
  ctx.lineWidth = isSelTop ? 2 : 1;
  ctx.strokeRect(topX, topPanelY, topW_px, Tpx);
  // 끼움형 상판이 이동된 경우: 위쪽 빈 공간 치수 표기
  if(topOffPx > 4)
    drawSpaceDims(ctx, topX, oy, topW_px, topOffPx, [], Tpx, sc);

  // ── 지판(하판) ──────────────────────────────────────
  const isSelBot = _sel && _sel.type==='botPanel';
  ctx.fillStyle = isSelBot ? '#bfdbfe' : '#d8d8d8';
  ctx.fillRect(botX, botPanelY, botW_px, Tpx);
  ctx.strokeStyle = isSelBot ? '#4361ee' : '#555';
  ctx.lineWidth = isSelBot ? 2 : 1;
  ctx.strokeRect(botX, botPanelY, botW_px, Tpx);
  // 끼움형 지판이 이동된 경우: 아래쪽 빈 공간 치수 표기
  if(botOffPx > 4)
    drawSpaceDims(ctx, botX, oy+fh-botOffPx, botW_px, botOffPx, [], Tpx, sc);

  // ── 측판 좌/우 ──────────────────────────────────────
  ctx.fillStyle='#c8c8c8';
  ctx.fillRect(ox,        sideY1, Tpx, sideHpx);
  ctx.fillRect(ox+fw-Tpx, sideY1, Tpx, sideHpx);
  ctx.strokeStyle='#444'; ctx.lineWidth=1;
  ctx.strokeRect(ox,        sideY1, Tpx, sideHpx);
  ctx.strokeRect(ox+fw-Tpx, sideY1, Tpx, sideHpx);

  // ── 수직 칸막이 (vDivPos 기반 위치, 고정/이동형 구분) ──
  for(let i=0;i<S.vCols-1;i++){
    const dx=divCenters[i]-Tpx/2;
    const isSelDiv=_sel&&_sel.type==='vdiv'&&_sel.idx===i;
    const isDivAdj=(S.vDivTypes||[])[i]==='adj';
    ctx.fillStyle=isSelDiv?'#bfdbfe':isDivAdj?'#bde0f8':'#d8d8d8';
    ctx.fillRect(dx, cy1, Tpx, iH);
    ctx.strokeStyle=isSelDiv?'#4361ee':isDivAdj?'#0ea5e9':'#555';
    ctx.lineWidth=isSelDiv?2:isDivAdj?1.2:1;
    ctx.strokeRect(dx, cy1, Tpx, iH);
    // 이동형 칸막이: 핀홀 점 표시
    if(isDivAdj&&Tpx>4){
      const dotR=Math.max(1,Math.min(2.5,Tpx*0.18));
      const spacing=Math.max(16,28*sc);
      ctx.fillStyle=isSelDiv?'#4361ee':'#0ea5e9';
      for(let dy=cy1+spacing;dy<cy2-spacing/2;dy+=spacing){
        ctx.beginPath();ctx.arc(dx+Tpx/2,dy,dotR,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // ── 칸별 내부 콘텐츠 + 공간 치수 표기 ───────────────
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    const {cx1, cx2}=colBounds[ci];
    const iW=cx2-cx1;
    const selShelfIdx=(_sel&&_sel.type==='shelf'&&_sel.ci===ci)?_sel.idx:-1;

    const shelfTypes=c.shelfTypes||[];
    if(c.type==='shelf'||c.type==='open'){
      const positions=c.type==='open'?[]:(c.shelfPos||[]);
      drawShelves(ctx,cx1,cy1,iW,iH,positions,Tpx,sc,selShelfIdx,shelfTypes);
      drawSpaceDims(ctx,cx1,cy1,iW,iH,positions,Tpx,sc);
    } else if(c.type==='drawer'){
      drawDrawers(ctx,cx1,cy1,iW,iH,Math.max(1,c.drawers||2),sc);
    } else if(c.type==='mixed'){
      const splitY=cy1+iH*0.55;
      ctx.fillStyle='#d8d8d8';
      ctx.fillRect(cx1,splitY,iW,Tpx);
      ctx.strokeStyle='#555'; ctx.lineWidth=1;
      ctx.strokeRect(cx1,splitY,iW,Tpx);
      const topH=splitY-cy1;
      const positions=c.shelfPos||[];
      drawShelves(ctx,cx1,cy1,iW,topH,positions,Tpx,sc,selShelfIdx,shelfTypes);
      drawSpaceDims(ctx,cx1,cy1,iW,topH,positions,Tpx,sc);
      drawDrawers(ctx,cx1,splitY+Tpx,iW,cy2-(splitY+Tpx),Math.max(1,c.drawers||2),sc);
    }
  }

  // ── 외곽 윤곽선 ─────────────────────────────────────
  ctx.strokeStyle='#111'; ctx.lineWidth=2.5; ctx.strokeRect(ox,oy,fw,fh);

  // ── 두께 치수 표기 ────────────────────────────────
  if(Tpx>6){
    const fnt=`${Math.max(8,Math.round(sc*8))}px 'Malgun Gothic',sans-serif`;
    ctx.font=fnt; ctx.fillStyle='#777'; ctx.textAlign='center';
    ctx.fillText(`T${S.T}`, ox+Tpx+(fw-2*Tpx)/2, oy+Tpx/2+4);
    ctx.fillText(`T${S.T}`, ox+Tpx+(fw-2*Tpx)/2, oy+fh-Tpx/2+4);
    ctx.save();
    ctx.translate(ox+Tpx/2, oy+fh/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(`T${S.T}`, 0, 4); ctx.restore();
    ctx.save();
    ctx.translate(ox+fw-Tpx/2, oy+fh/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(`T${S.T}`, 0, 4); ctx.restore();
  }

  // ── 후판 홈 삽입(Dado) 시각화 ────────────────────────
  if(S.backJoint==='dado' && Tpx>6){
    const {dadoW:dW, dadoD:dD, dadoPos:dP} = S;
    const dWpx = dW*sc, dDpx = dD*sc, dPpx = dP*sc;
    // 홈은 각 판재의 내면에서 dadoD 깊이, 위치는 배면에서 dadoPos+dadoW 까지
    // 정면도에서: 판재 두께(Tpx) 안에 홈 깊이(dDpx)를 표시

    ctx.save();
    ctx.fillStyle='rgba(67,97,238,0.18)';
    ctx.strokeStyle='#4361ee';
    ctx.lineWidth=0.8;
    ctx.setLineDash([3,2]);

    // 좌 측판 홈 (내면 기준)
    ctx.fillRect(ox+Tpx-dDpx, sideY1, dDpx, sideHpx);
    ctx.strokeRect(ox+Tpx-dDpx, sideY1, dDpx, sideHpx);
    // 우 측판 홈
    ctx.fillRect(ox+fw-Tpx, sideY1, dDpx, sideHpx);
    ctx.strokeRect(ox+fw-Tpx, sideY1, dDpx, sideHpx);
    // 상판 홈
    ctx.fillRect(topX, oy+Tpx-dDpx, topW_px, dDpx);
    ctx.strokeRect(topX, oy+Tpx-dDpx, topW_px, dDpx);
    // 지판 홈
    ctx.fillRect(botX, oy+fh-Tpx, botW_px, dDpx);
    ctx.strokeRect(botX, oy+fh-Tpx, botW_px, dDpx);

    ctx.setLineDash([]);
    ctx.restore();

    // 홈 치수 레이블 (좌 측판 기준)
    const fntSm=`${Math.max(7,Math.round(sc*7))}px 'Malgun Gothic',sans-serif`;
    ctx.font=fntSm; ctx.fillStyle='#4361ee'; ctx.textAlign='left';
    ctx.save();
    ctx.translate(ox+Tpx-dDpx/2, sideY1+6);
    ctx.rotate(-Math.PI/2);
    ctx.fillText(`홈 ${dW}×${dD}mm`, 0, 3);
    ctx.restore();
  }

  // ── 문 ───────────────────────────────────────────
  if(S.hasDoor){
    const ins=Math.max(5,12*sc);
    if(S.doorType==='swing'){
      for(let ci=0;ci<S.vCols;ci++){
        const dx=ci===0?ox:divCenters[ci-1];
        const dr=ci===S.vCols-1?ox+fw:divCenters[ci];
        const dw=dr-dx, isL=ci<S.vCols/2;
        ctx.strokeStyle='#000'; ctx.lineWidth=2.2; ctx.strokeRect(dx,oy,dw,fh);
        ctx.strokeStyle='#444'; ctx.lineWidth=1;   ctx.strokeRect(dx+ins,oy+ins,dw-ins*2,fh-ins*2);
        const hx=isL?dx+4:dx+dw-4; ctx.fillStyle='#666';
        for(const hy of[oy+Math.min(70*sc,fh*0.1),oy+fh-Math.min(70*sc,fh*0.1)]){
          ctx.beginPath();ctx.arc(hx,hy,Math.max(2,2.5*sc),0,Math.PI*2);ctx.fill();
        }
        if(S.handle!=='none') drawHandle(ctx,isL?dx+dw-Math.max(10,16*sc):dx+Math.max(10,16*sc),oy+fh/2,sc);
      }
    } else {
      const pW=fw*0.55;
      ctx.strokeStyle='#000';ctx.lineWidth=2.2;
      ctx.strokeRect(ox,oy,pW,fh); ctx.strokeStyle='#444';ctx.lineWidth=1; ctx.strokeRect(ox+ins,oy+ins,pW-ins*2,fh-ins*2);
      ctx.strokeStyle='#000';ctx.lineWidth=2.2;
      ctx.strokeRect(ox+fw-pW,oy,pW,fh); ctx.strokeStyle='#444';ctx.lineWidth=1; ctx.strokeRect(ox+fw-pW+ins,oy+ins,pW-ins*2,fh-ins*2);
      ctx.setLineDash([5,4]);ctx.strokeStyle='#aaa';ctx.lineWidth=1;
      L(ctx,ox+pW,oy,ox+pW,oy+fh);L(ctx,ox+fw-pW,oy,ox+fw-pW,oy+fh);
      ctx.setLineDash([]);
      if(S.handle!=='none'){drawHandle(ctx,ox+pW-Math.max(10,14*sc),oy+fh/2,sc);drawHandle(ctx,ox+fw-pW+Math.max(10,14*sc),oy+fh/2,sc);}
    }
  }

  // ── 외부 치수선 ─────────────────────────────────────
  dimH(ctx,ox,oy+fh+28,fw,`${S.w}mm`,'#4361ee');
  dimV(ctx,ox+fw+28,oy,fh,`${S.h}mm`,'#4361ee');
  ctx.fillStyle='#999';ctx.font=`${Math.max(9,Math.round(sc*9))}px 'Malgun Gothic',sans-serif`;ctx.textAlign='right';
  ctx.fillText(`D: ${S.d}mm  T: ${S.T}mm`,canvas.width-4,14);

  // ── 칸 내부 폭 표기 (vDivPos 기반 실제 폭) ──────────
  ctx.fillStyle='#888';ctx.font=`${Math.max(8,Math.round(sc*9))}px 'Malgun Gothic',sans-serif`;ctx.textAlign='center';
  for(let ci=0;ci<S.vCols;ci++){
    const {cx1,cx2}=colBounds[ci];
    const colWmm=Math.round((cx2-cx1)/sc);
    ctx.fillText(`${colWmm}`,( cx1+cx2)/2,oy+fh+15);
  }

  // ── 선택된 선반: 하단으로부터 거리 치수선 ─────────────
  if(_sel&&_sel.type==='shelf'){
    const {ci:sci,idx:sidx}=_sel;
    const sc2=S.cols[sci];
    if(sc2&&sc2.shelfPos&&sidx<sc2.shelfPos.length){
      const {cx1:scx1,cx2:scx2}=colBounds[sci];
      const iH2=cy2-cy1;
      const topH2=sc2.type==='mixed'?iH2*0.55:iH2;
      const pos2=sc2.shelfPos[sidx];
      const shelfBotY=cy1+pos2*topH2+Tpx/2;
      const dimLen=cy2-shelfBotY;
      if(dimLen>10){
        const ax=scx2-12;
        const fromBotMm=Math.round(dimLen/sc);
        const fntSz2=Math.max(9,Math.round(sc*10));
        const R='#e03333';
        ctx.save();
        // 치수선
        ctx.strokeStyle=R;ctx.fillStyle=R;ctx.lineWidth=1.5;
        ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(ax,shelfBotY);ctx.lineTo(ax,cy2);ctx.stroke();
        ctx.setLineDash([]);
        // 위 화살표 (선반 하면)
        ctx.beginPath();ctx.moveTo(ax,shelfBotY);ctx.lineTo(ax-4,shelfBotY+9);ctx.lineTo(ax+4,shelfBotY+9);ctx.closePath();ctx.fill();
        // 아래 화살표 (지판 내면)
        ctx.beginPath();ctx.moveTo(ax,cy2);ctx.lineTo(ax-4,cy2-9);ctx.lineTo(ax+4,cy2-9);ctx.closePath();ctx.fill();
        // 레이블 배지
        const midY=(shelfBotY+cy2)/2;
        ctx.font=`bold ${fntSz2}px 'Malgun Gothic',sans-serif`;
        const lbl=`${fromBotMm}`;
        const tw2=ctx.measureText(lbl).width;
        const bx2=ax-tw2/2-4,by2=midY-fntSz2+1,bw2=tw2+8,bh2=fntSz2+4;
        ctx.fillStyle='rgba(255,240,240,0.94)';
        ctx.beginPath();ctx.roundRect?ctx.roundRect(bx2,by2,bw2,bh2,3):ctx.fillRect(bx2,by2,bw2,bh2);ctx.fill();
        ctx.strokeStyle=R;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.roundRect?ctx.roundRect(bx2,by2,bw2,bh2,3):ctx.strokeRect(bx2,by2,bw2,bh2);ctx.stroke();
        ctx.fillStyle=R;ctx.textAlign='center';
        ctx.fillText(lbl,ax,midY+fntSz2/3);
        ctx.restore();
      }
    }
  }
  syncShelfPosBar();
}

function L(ctx,x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
// positions: 선반 중심 비율 배열, selIdx: 선택 인덱스, shelfTypes: 배열 또는 'fixed'|'adj'
function drawShelves(ctx,x,y,w,h,positions,Tpx,sc,selIdx,shelfTypes){
  for(let i=0;i<positions.length;i++){
    const t=Array.isArray(shelfTypes)?(shelfTypes[i]||'fixed'):shelfTypes;
    const isAdj=(t==='adj');
    const sy=y+positions[i]*h-Tpx/2;
    const isSel=(selIdx===i);
    // 배경색: 선택=파랑, 이동형=하늘색, 고정형=회색
    ctx.fillStyle=isSel?'#bfdbfe':isAdj?'#bde0f8':'#d8d8d8';
    ctx.fillRect(x+1,sy,w-2,Tpx);
    ctx.strokeStyle=isSel?'#4361ee':isAdj?'#0ea5e9':'#444';
    ctx.lineWidth=isSel?2:isAdj?1.2:1;
    ctx.strokeRect(x+1,sy,w-2,Tpx);
    // 이동형: 선반핀 홀 점 표시
    if(isAdj&&Tpx>4){
      const dotR=Math.max(1,Math.min(2.5,Tpx*0.18));
      const spacing=Math.max(16,28*sc);
      ctx.fillStyle=isSel?'#4361ee':'#0ea5e9';
      for(let dx=x+spacing;dx<x+w-spacing/2;dx+=spacing){
        ctx.beginPath();ctx.arc(dx,sy+Tpx/2,dotR,0,Math.PI*2);ctx.fill();
      }
    }
    if(Tpx>10&&sc){
      ctx.fillStyle=isSel?'#4361ee':isAdj?'#0ea5e9':'#888';
      ctx.font=`${Math.max(7,Math.round(sc*7.5))}px 'Malgun Gothic',sans-serif`;
      ctx.textAlign='right';
      ctx.fillText(`T${S.T}`,x-2,sy+Tpx/2+3);
    }
  }
}
// 각 공간(칸)의 높이(mm)를 캔버스에 표기
function drawSpaceDims(ctx,x,y,w,h,positions,Tpx,sc){
  const spaces=[];
  if(positions.length===0){
    spaces.push({t:y,b:y+h});
  } else {
    spaces.push({t:y, b:y+positions[0]*h-Tpx/2});
    for(let i=0;i<positions.length-1;i++)
      spaces.push({t:y+positions[i]*h+Tpx/2, b:y+positions[i+1]*h-Tpx/2});
    spaces.push({t:y+positions[positions.length-1]*h+Tpx/2, b:y+h});
  }
  const fntSz=Math.max(9,Math.round(sc*10));
  ctx.textAlign='center';
  for(const sp of spaces){
    const spH=sp.b-sp.t;
    if(spH<fntSz+6) continue;
    const spMm=Math.round(spH/sc);
    const midX=x+w/2, midY=(sp.t+sp.b)/2;
    ctx.font=`bold ${fntSz}px 'Malgun Gothic',sans-serif`;
    const tw=ctx.measureText(`${spMm}`).width;
    // 반투명 배경
    ctx.fillStyle='rgba(240,246,255,0.82)';
    ctx.beginPath();
    const bx=midX-tw/2-4, by=midY-fntSz+1, bw=tw+8, bh=fntSz+4;
    ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.fillRect(bx,by,bw,bh);
    ctx.fill();
    ctx.strokeStyle='#c7d2fe'; ctx.lineWidth=0.8;
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.strokeRect(bx,by,bw,bh);
    ctx.stroke();
    ctx.fillStyle='#3a5a9a';
    ctx.fillText(`${spMm}`,midX,midY+fntSz/3);
  }
}
function drawDrawers(ctx,x,y,w,h,n,sc){
  const dh=h/n;
  const fntSz=Math.max(9,Math.round(sc*10));
  for(let i=0;i<n;i++){
    const dy=y+dh*i; ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.strokeRect(x+4,dy+3,w-8,dh-6);
    drawHandle(ctx,x+w/2,dy+dh/2,sc);
    if(dh>fntSz+10){
      const dhMm=Math.round(dh/sc);
      const midX=x+w/2, midY=dy+dh/2;
      ctx.font=`bold ${fntSz}px 'Malgun Gothic',sans-serif`;
      ctx.textAlign='center';
      const tw=ctx.measureText(`${dhMm}`).width;
      ctx.fillStyle='rgba(240,246,255,0.82)';
      const bx=midX-tw/2-4,by=midY-fntSz+1,bw=tw+8,bh=fntSz+4;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.fillRect(bx,by,bw,bh);
      ctx.fill();
      ctx.strokeStyle='#c7d2fe';ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.strokeRect(bx,by,bw,bh);
      ctx.stroke();
      ctx.fillStyle='#3a5a9a';
      ctx.fillText(`${dhMm}`,midX,midY+fntSz/3);
    }
  }
}
function drawHandle(ctx,x,y,sc){
  ctx.strokeStyle='#222';ctx.fillStyle='#222';ctx.lineWidth=Math.max(1.5,2*sc);
  if(S.handle==='bar'){const hl=Math.max(8,20*sc);L(ctx,x,y-hl/2,x,y+hl/2);}
  else if(S.handle==='knob'){ctx.beginPath();ctx.arc(x,y,Math.max(2.5,3.5*sc),0,Math.PI*2);ctx.fill();}
}
function tri(ctx,x,y,s,d){
  ctx.beginPath();
  if(d==='r'){ctx.moveTo(x+s,y);ctx.lineTo(x,y-s);ctx.lineTo(x,y+s);}
  if(d==='l'){ctx.moveTo(x-s,y);ctx.lineTo(x,y-s);ctx.lineTo(x,y+s);}
  if(d==='d'){ctx.moveTo(x,y+s);ctx.lineTo(x-s,y);ctx.lineTo(x+s,y);}
  if(d==='u'){ctx.moveTo(x,y-s);ctx.lineTo(x-s,y);ctx.lineTo(x+s,y);}
  ctx.closePath();ctx.fill();
}
function dimH(ctx,x,y,len,lbl,col){
  ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
  L(ctx,x,y,x+len,y);L(ctx,x,y-6,x,y+6);L(ctx,x+len,y-6,x+len,y+6);
  tri(ctx,x,y,5,'r');tri(ctx,x+len,y,5,'l');
  ctx.font=`bold 11px 'Malgun Gothic',sans-serif`;ctx.textAlign='center';ctx.fillText(lbl,(x+x+len)/2,y-6);
}
function dimV(ctx,x,y,len,lbl,col){
  ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
  L(ctx,x,y,x,y+len);L(ctx,x-6,y,x+6,y);L(ctx,x-6,y+len,x+6,y+len);
  tri(ctx,x,y,5,'d');tri(ctx,x,y+len,5,'u');
  ctx.save();ctx.translate(x+14,(y+y+len)/2);ctx.rotate(-Math.PI/2);
  ctx.font=`bold 11px 'Malgun Gothic',sans-serif`;ctx.textAlign='center';ctx.fillText(lbl,0,0);ctx.restore();
}

let rTimer;
window.addEventListener('resize',()=>{clearTimeout(rTimer);rTimer=setTimeout(draw,80);});

// ── 선반 하단 거리 계산 / 입력 핸들러 ─────────────────
function _shelfEffH(ci){
  // 해당 칸의 선반이 위치하는 높이 범위(px)
  if(!_cs.sc) return {areaY:0,areaH:0};
  const {cy1,cy2}=_cs;
  const iH=cy2-cy1;
  const c=S.cols[ci];
  return {areaY:cy1, areaH:(c&&c.type==='mixed')?iH*0.55:iH};
}
function calcFromBottom(ci,idx){
  // 선반 하면 → 지판 내면 거리 (mm)
  if(!_cs.sc) return 0;
  const c=S.cols[ci];
  if(!c||!c.shelfPos||idx>=c.shelfPos.length) return 0;
  const {cy2,Tpx,sc}=_cs;
  const {areaY,areaH}=_shelfEffH(ci);
  const shelfBotY=areaY+c.shelfPos[idx]*areaH+Tpx/2;
  return Math.round((cy2-shelfBotY)/sc);
}
let _barSelKey=''; // 마지막으로 바에 표시된 선반 키 (선택 변경 감지용)
function syncShelfPosBar(){
  const bar=document.getElementById('shelfPosBar');
  if(!bar) return;
  if(!_sel||_sel.type!=='shelf'||!_cs.sc){
    bar.style.display='none'; _barSelKey=''; return;
  }
  const {ci,idx}=_sel;
  const c=S.cols[ci];
  if(!c||!c.shelfPos||idx>=c.shelfPos.length){bar.style.display='none';return;}
  bar.style.display='flex';
  const LBL=['A','B','C','D'];
  const lbl=document.getElementById('shelfPosLabel');
  if(lbl) lbl.textContent=`${S.vCols>1?LBL[ci]+'칸 ':''}선반 ${idx+1}`;
  const input=document.getElementById('shelfPosInput');
  const selKey=`${ci}-${idx}`;
  // 선택된 선반이 바뀌었거나, 사용자가 입력 중이 아닐 때만 값 갱신
  if(input&&(selKey!==_barSelKey||document.activeElement!==input)){
    input.value=calcFromBottom(ci,idx);
  }
  _barSelKey=selKey;
  const range=document.getElementById('shelfPosRange');
  if(range){
    const {sc}=_cs;
    const {areaH}=_shelfEffH(ci);
    const iHmm=Math.round(areaH/sc);
    range.textContent=`범위 ${S.T}~${iHmm-S.T}mm`;
  }
}
function applyShelfPosInput(val){
  if(!_sel||_sel.type!=='shelf') return;
  const {ci,idx}=_sel;
  const c=S.cols[ci];
  if(!c||!c.shelfPos) return;
  const fromBot=parseFloat(val);
  if(isNaN(fromBot)||fromBot<0) return;
  const {cy1,cy2,Tpx,sc}=_cs;
  if(!sc) return;
  const {areaY,areaH}=_shelfEffH(ci);
  // shelfBotY = cy2 - fromBot*sc  →  pos = (shelfBotY - Tpx/2 - areaY) / areaH
  const shelfBotY=cy2-fromBot*sc;
  let newPos=(shelfBotY-Tpx/2-areaY)/areaH;
  const positions=c.shelfPos;
  const minGap=Tpx/areaH+0.01;
  const lo=idx>0?positions[idx-1]+minGap:minGap/2;
  const hi=idx<positions.length-1?positions[idx+1]-minGap:1-minGap/2;
  positions[idx]=Math.max(lo,Math.min(hi,newPos));
  draw();
}
function nudgeShelf(deltaMm){
  if(!_sel||_sel.type!=='shelf') return;
  const cur=calcFromBottom(_sel.ci,_sel.idx);
  applyShelfPosInput(cur+deltaMm);
  const input=document.getElementById('shelfPosInput');
  if(input) input.value=calcFromBottom(_sel.ci,_sel.idx);
}

// ── Canvas 마우스 인터랙션 ────────────────────────────
(function(){
  const cv=document.getElementById('cv');

  function hitTest(mx,my){
    if(!_cs.sc) return null;
    const {Tpx,innerXstart,innerWpx,colBounds,cy1,cy2,
           sideHpx,topPanelY,botPanelY,oy,topX,topW_px,botX,botW_px}=_cs;
    const hit=Math.max(10,Tpx+4);

    // 끼움형 상판 히트 (끼움형일 때만)
    if(S.topJoint==='between'){
      const panelCY=topPanelY+Tpx/2;
      if(Math.abs(my-panelCY)<hit&&mx>topX&&mx<topX+topW_px)
        return{type:'topPanel'};
    }
    // 끼움형 지판 히트
    if(S.bottomJoint==='between'){
      const panelCY=botPanelY+Tpx/2;
      if(Math.abs(my-panelCY)<hit&&mx>botX&&mx<botX+botW_px)
        return{type:'botPanel'};
    }
    // 수직 칸막이 히트
    for(let i=0;i<(S.vDivPos||[]).length;i++){
      const cx=innerXstart+S.vDivPos[i]*innerWpx;
      if(Math.abs(mx-cx)<hit&&my>cy1&&my<cy2)
        return{type:'vdiv',idx:i};
    }
    // 선반 히트
    for(let ci=0;ci<S.vCols;ci++){
      const c=S.cols[ci];
      if(!c.shelfPos||!c.shelfPos.length) continue;
      const{cx1,cx2}=colBounds[ci];
      if(mx<cx1-4||mx>cx2+4) continue;
      const totalH=cy2-cy1;
      const h=c.type==='mixed'?totalH*0.55:totalH;
      const y=cy1;
      for(let j=0;j<c.shelfPos.length;j++){
        if(Math.abs(my-(y+c.shelfPos[j]*h))<hit)
          return{type:'shelf',ci,idx:j,h,y};
      }
    }
    return null;
  }

  cv.addEventListener('mousedown',e=>{
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const h=hitTest(mx,my);
    if(h){
      if(h.type==='topPanel'){
        _sel={type:'topPanel'};
        _drag={type:'topPanel',startY:my,startPos:S.topPanelPos||0,sideHpx:_cs.sideHpx};
      } else if(h.type==='botPanel'){
        _sel={type:'botPanel'};
        _drag={type:'botPanel',startY:my,startPos:S.botPanelPos||0,sideHpx:_cs.sideHpx};
      } else if(h.type==='vdiv'){
        _sel={type:'vdiv',idx:h.idx};
        _drag={type:'vdiv',idx:h.idx,startX:mx,startPos:S.vDivPos[h.idx]};
      } else {
        _sel={type:'shelf',ci:h.ci,idx:h.idx};
        _drag={type:'shelf',ci:h.ci,idx:h.idx,startY:my,
               startPos:S.cols[h.ci].shelfPos[h.idx],h:h.h,y:h.y};
      }
    } else {
      _sel=null;
    }
    draw(); syncShelfPosBar(); e.preventDefault();
  });

  cv.addEventListener('mousemove',e=>{
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const h=hitTest(mx,my);
    cv.style.cursor=h?(h.type==='vdiv'?'ew-resize':'ns-resize'):'default';
    if(!_drag) return;
    const{Tpx,innerWpx}=_cs;

    if(_drag.type==='topPanel'){
      let newPos=_drag.startPos+(my-_drag.startY)/_drag.sideHpx;
      S.topPanelPos=Math.max(0,Math.min(0.6,newPos));
      draw();
    } else if(_drag.type==='botPanel'){
      let newPos=_drag.startPos-(my-_drag.startY)/_drag.sideHpx;
      S.botPanelPos=Math.max(0,Math.min(0.6,newPos));
      draw();
    } else if(_drag.type==='shelf'){
      const dy=my-_drag.startY;
      const positions=S.cols[_drag.ci].shelfPos;
      let newPos=_drag.startPos+dy/_drag.h;
      const minGap=Tpx/_drag.h+0.01;
      const lo=_drag.idx>0?positions[_drag.idx-1]+minGap:minGap/2;
      const hi=_drag.idx<positions.length-1?positions[_drag.idx+1]-minGap:1-minGap/2;
      positions[_drag.idx]=Math.max(lo,Math.min(hi,newPos));
      draw();
    } else if(_drag.type==='vdiv'){
      const dx=mx-_drag.startX;
      let newPos=_drag.startPos+dx/innerWpx;
      const minGap=Tpx/innerWpx+0.02;
      const lo=_drag.idx>0?S.vDivPos[_drag.idx-1]+minGap:minGap;
      const hi=_drag.idx<S.vDivPos.length-1?S.vDivPos[_drag.idx+1]-minGap:1-minGap;
      S.vDivPos[_drag.idx]=Math.max(lo,Math.min(hi,newPos));
      draw();
    }
  });

  cv.addEventListener('mouseup',()=>{ _drag=null; });
  cv.addEventListener('mouseleave',()=>{ _drag=null; });
})();

render();
</script>
