<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가구 외형 설계</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f5f5f5; font-size: 14px; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100vh; }

.header {
  background: #000; color: white;
  padding: 11px 20px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header span { font-size: 12px; color: #aaa; }
.version-badge { margin-left: auto; font-size: 11px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 2px 10px; color: #ccc; white-space: nowrap; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── Survey panel ── */
.survey { width: 360px; min-width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
.survey-scroll { flex: 1; overflow-y: auto; padding: 18px; }
.survey-nav { padding: 10px 14px; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0; }

.progress { display: flex; gap: 3px; margin-bottom: 14px; }
.prog-seg { flex: 1; height: 4px; border-radius: 2px; background: #e8e8e8; transition: background .25s; }
.prog-seg.done   { background: #555; }
.prog-seg.active { background: #000; }

.step-label { font-size: 11px; color: #888; margin-bottom: 3px; }
.step-title { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 16px; }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-card { border: 2px solid #e8e8e8; border-radius: 10px; padding: 12px 6px; cursor: pointer; text-align: center; background: white; transition: all .15s; font-family: inherit; }
.type-card:hover { border-color: #333; background: #f5f5f5; }
.type-card.sel   { border-color: #000; background: #f0f0f0; }
.type-card .ico  { margin-bottom: 6px; display:flex; align-items:center; justify-content:center; height:38px; }
.type-card .ico svg { transition: stroke .15s; }
.type-card.sel .ico svg, .type-card:hover .ico svg { stroke: #000; }
.type-card .nm   { font-size: 12px; font-weight: 700; }
.type-card .sub  { font-size: 10px; color: #999; margin-top: 2px; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
.field-row { display: flex; align-items: center; gap: 8px; }
.field-row input[type=range] { flex: 1; accent-color: #111; margin-top: 4px; }
.field-row input[type=number] { width: 72px; padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; font-family: inherit; text-align: right; }
.field-row input:focus { outline: none; border-color: #111; }

/* 샌드방향 아이콘 카드 */
.joint-section { margin-bottom: 18px; }
.joint-section-title { font-size: 12px; font-weight: 700; color: #444; margin-bottom: 8px; }
.joint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.joint-card {
  border: 2px solid #e0e0e0; border-radius: 10px;
  padding: 12px 8px 10px;
  background: white; cursor: pointer;
  text-align: center; font-family: inherit;
  transition: border-color .15s, color .15s, box-shadow .15s;
  color: #555;
}
.joint-card:hover { border-color: #aaa; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.joint-card.sel  { border-color: #000; color: #000; box-shadow: 0 2px 12px rgba(0,0,0,.18); }
.joint-card svg  { display: block; margin: 0 auto 6px; }
.jc-label { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.jc-sub   { font-size: 10px; opacity: .7; }
.joint-summary {
  background: #f5f5f5; border-radius: 8px;
  padding: 9px 12px; font-size: 11px; color: #444; line-height: 1.9;
}

/* 외경 크기 입력 전용 */
.size-input-wrap { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.size-input-wrap label { font-size: 12px; color: #555; font-weight: 600; }
.size-input-row { display: flex; align-items: center; gap: 6px; }
.size-num {
  flex: 1; padding: 9px 12px;
  border: 1.5px solid #ccc; border-radius: 8px;
  font-size: 18px; font-weight: 700; font-family: inherit;
  text-align: center; color: #1a1a2e;
  transition: border-color .15s, box-shadow .15s;
  -moz-appearance: textfield;
}
.size-num::-webkit-inner-spin-button,
.size-num::-webkit-outer-spin-button { -webkit-appearance: none; }
.size-num:focus { outline: none; border-color: #111; box-shadow: 0 0 0 3px rgba(0,0,0,.12); }
.size-num.changed { border-color: #555; }
.step-btn {
  width: 34px; height: 42px; border: 1.5px solid #ddd; border-radius: 8px;
  background: white; font-size: 18px; color: #555; cursor: pointer;
  font-family: inherit; transition: all .12s; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-btn:hover { background: #f0f0f0; border-color: #333; color: #333; }
.step-btn:active { transform: scale(.93); }
.size-slider { width: 100%; accent-color: #111; }
.unit { font-size: 11px; color: #999; }

.size-summary { margin-top: 4px; padding: 7px 10px; background: #f5f5f5; border-radius: 6px; font-size: 11px; color: #555; font-weight: 600; }

/* thickness preset cards */
.thick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.thick-card { border: 2px solid #e8e8e8; border-radius: 8px; padding: 8px; cursor: pointer; text-align: center; background: white; transition: all .15s; font-family: inherit; }
.thick-card:hover { border-color: #333; background: #f5f5f5; }
.thick-card.sel  { border-color: #000; background: #f0f0f0; }
.thick-card .tv  { font-size: 17px; font-weight: 700; color: #111; }
.thick-card .tn  { font-size: 10px; color: #888; }

/* back thickness pill buttons */
.pill-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.pill-btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 20px; background: white; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
.pill-btn.sel { background: #111; color: white; border-color: #111; }

/* 후판 삽입(Dado) 설정 */
.dado-box { margin-top: 10px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; }
.dado-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
.dado-item { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 8px 6px; }
.dado-lbl { font-size: 11px; font-weight: 700; color: #333; margin-bottom: 4px; }
.dado-row { display: flex; align-items: center; gap: 3px; }
.dado-num { width: 100%; padding: 5px 6px; border: 1.5px solid #ccc; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: inherit; text-align: center; color: #1a1a2e; -moz-appearance: textfield; }
.dado-num::-webkit-inner-spin-button, .dado-num::-webkit-outer-spin-button { -webkit-appearance: none; }
.dado-num:focus { outline: none; border-color: #333; box-shadow: 0 0 0 2px rgba(0,0,0,.12); }
.dado-hint { font-size: 10px; color: #888; margin-top: 3px; text-align: center; }
.dado-note { font-size: 11px; color: #333; margin-top: 8px; line-height: 1.7; }

.nbtn-row { display: flex; gap: 6px; }
.nbtn { width: 46px; height: 46px; border: 2px solid #e8e8e8; border-radius: 8px; background: white; font-size: 17px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
.nbtn.sel { border-color: #000; background: #f0f0f0; color: #000; }
.nbtn:hover:not(.sel) { border-color: #333; }

.col-card { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
.col-card-title { font-size: 11px; font-weight: 700; color: #333; margin-bottom: 7px; }
.ctype-row { display: flex; gap: 4px; }
.ctype-btn { flex: 1; padding: 5px 3px; border: 1px solid #ccc; border-radius: 6px; background: white; font-size: 11px; cursor: pointer; font-family: inherit; text-align: center; transition: all .15s; }
.ctype-btn.sel { background: #000; color: white; border-color: #000; }
.sub-field { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
.sub-field label { font-size: 11px; color: #555; }
.sub-field input[type=number] { width: 44px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 12px; font-family: inherit; margin-left: 4px; }

/* 고정형/이동형 선택 */
.fxadj-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; }
.fxadj-lbl { font-size: 11px; color: #666; white-space: nowrap; }
.fxadj-btn { padding: 3px 10px; border: 1px solid #ccc; border-radius: 14px; background: white; font-size: 11px; cursor: pointer; font-family: inherit; transition: all .13s; }
.fxadj-btn.sel  { background: #000; color: white; border-color: #000; }
.fxadj-btn.adj-sel { background: #333; color: white; border-color: #333; }
.div-type-section { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 8px; padding: 9px 12px; margin-top: 4px; }
.div-type-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.div-type-row:last-child { margin-bottom: 0; }
/* 이동형 선반: 캔버스 범례 */
.canvas-legend { display: flex; gap: 12px; font-size: 10px; color: #888; padding: 4px 8px; background:#f9f9f9; border-top: 1px solid #eee; flex-shrink:0; }

.toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
.tbtn { flex: 1; padding: 9px 6px; border: 2px solid #e8e8e8; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; transition: all .15s; }
.tbtn.sel { border-color: #000; background: #f0f0f0; color: #000; font-weight: 600; }

.btn-next { flex: 1; padding: 10px; background: #111; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-next:disabled { background: #c5c5c5; cursor: default; }
.btn-prev { padding: 10px 14px; background: white; color: #111; border: 2px solid #111; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }

.tag { display: inline-block; padding: 2px 8px; background: #f0f0f0; color: #333; border-radius: 12px; font-size: 11px; margin: 2px; }
.result-box { background: #f8f8f8; border: 1px solid #ddd; border-radius: 8px; padding: 11px 13px; margin-bottom: 12px; }
.result-title { font-weight: 700; color: #111; margin-bottom: 5px; font-size: 13px; }
.result-row { font-size: 12px; color: #444; line-height: 1.9; }

/* ── Right panel ── */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.tabs { display: flex; background: white; border-bottom: 1px solid #ddd; flex-shrink: 0; }
.tab-btn { padding: 10px 22px; border: none; background: none; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; font-family: inherit; border-bottom: 3px solid transparent; transition: all .15s; }
.tab-btn.active { color: #000; border-bottom-color: #000; }

.tab-pane { display: none; flex: 1; overflow: hidden; }
.tab-pane.active { display: flex; }
#paneDraw { position: relative; flex-direction: column; }

/* canvas tab */
.canvas-wrap { flex: 1; overflow: auto; background: #e8ecf0; display: flex; align-items: center; justify-content: center; padding: 24px; }
canvas#cv { background: white; box-shadow: 0 6px 24px rgba(0,0,0,.12); display: block; }

/* parts list tab */
.parts-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; background: #fafafa; }
.parts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.parts-header h2 { font-size: 14px; font-weight: 700; color: #111; }

.assembly-note { background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #795548; margin-bottom: 12px; line-height: 1.7; }

table.parts { width: 100%; border-collapse: collapse; font-size: 13px; }
table.parts th { background: #1a1a2e; color: white; padding: 7px 10px; text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
table.parts td { padding: 6px 10px; border-bottom: 1px solid #eee; text-align: center; }
table.parts tr:hover td { background: #f5f5f5; }
table.parts .g-shelf  td { color: #333; }
table.parts .g-door   td { color: #333; }
table.parts .g-drawer td { color: #333; }
table.parts .g-div    td { color: #333; }
table.parts .g-total  td { background: #f0f0f0; font-weight: 700; border-top: 2px solid #333; }

.dim-chip { display: inline-block; background: #f0f0f0; border: 1px solid #ccc; border-radius: 5px; padding: 2px 8px; font-size: 12px; font-weight: 700; color: #333; white-space: nowrap; }

.export-btn { padding: 6px 14px; background: white; color: #333; border: 1px solid #999; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
.export-btn:hover { background: #f5f5f5; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="1" y="2" width="18" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
      <line x1="1" y1="7" x2="19" y2="7" stroke="white" stroke-width="1.5"/>
      <line x1="10" y1="7" x2="10" y2="16" stroke="white" stroke-width="1.5"/>
    </svg>
    <h1>가구 외형 설계</h1>
    <span>설문으로 가구 외형 및 자재 목록을 생성합니다</span>
    <span class="version-badge">v2.19.0</span>
  </div>

  <div class="main">
    <div class="survey">
      <div class="survey-scroll" id="surveyScroll">
        <div class="progress" id="progBar"></div>
        <div id="stepBody"></div>
      </div>
      <div class="survey-nav">
        <button class="btn-prev" id="btnPrev" onclick="prev()">← 이전</button>
        <button class="btn-next" id="btnNext" onclick="next()">다음 →</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="tabs">
        <button class="tab-btn active" id="tabDraw"  onclick="switchTab('draw')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><rect x="1" y="1" width="12" height="12" rx="1"/><line x1="1" y1="5" x2="13" y2="5"/><line x1="5" y1="5" x2="5" y2="13"/></svg>정면도</button>
        <button class="tab-btn"        id="tabParts" onclick="switchTab('parts')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><rect x="2" y="1" width="10" height="12" rx="1"/><line x1="4" y1="5" x2="10" y2="5"/><line x1="4" y1="8" x2="10" y2="8"/><line x1="4" y1="11" x2="7" y2="11"/></svg>자재 목록</button>
      </div>

      <div class="tab-pane active" id="paneDraw">
        <div class="canvas-wrap" id="cvWrap">
          <canvas id="cv"></canvas>
        </div>
        <div class="canvas-legend" id="cvLegend">
          <!-- 기본 범례 -->
          <span id="lgDefault">
            <span>■ <span style="background:#e2e2e2;padding:0 4px;border-radius:2px;font-size:10px">상/지판</span></span>
            <span>■ <span style="background:#d0d0d0;padding:0 4px;border-radius:2px;font-size:10px">측판</span></span>
            <span>■ <span style="background:#d5d5d5;padding:0 4px;border-radius:2px;font-size:10px">고정선반</span></span>
            <span>■ <span style="background:#c8c8c8;padding:0 4px;border-radius:2px;font-size:10px;color:#333">이동선반</span></span>
          </span>
          <!-- 부속구분 범례 (숨김) -->
          <span id="lgColor" style="display:none">
            <span>■ <span style="background:#fef9c3;border:1px solid #ca8a04;padding:0 4px;border-radius:2px;font-size:10px;color:#92400e">상판</span></span>
            <span>■ <span style="background:#dcfce7;border:1px solid #16a34a;padding:0 4px;border-radius:2px;font-size:10px;color:#166534">지판</span></span>
            <span>■ <span style="background:#dbeafe;border:1px solid #2563eb;padding:0 4px;border-radius:2px;font-size:10px;color:#1e40af">측판</span></span>
            <span>■ <span style="background:#f3e8ff;border:1px solid #9333ea;padding:0 4px;border-radius:2px;font-size:10px;color:#6b21a8">선반</span></span>
            <span>■ <span style="background:#fce7f3;border:1px solid #db2777;padding:0 4px;border-radius:2px;font-size:10px;color:#9d174d">칸막이</span></span>
          </span>
          <!-- 체크박스 -->
          <label style="margin-left:auto;display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:#555;white-space:nowrap;user-select:none">
            <input type="checkbox" id="chkPartColor" style="width:13px;height:13px;cursor:pointer" onchange="togglePartColor(this.checked)">
            부속 구분 보기
          </label>
        </div>
        <!-- 부속 편집 바: 캔버스 위 플로팅 -->
        <div id="partEditBar" style="display:none;position:absolute;bottom:38px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(255,255,255,0.97);border:1.5px solid #ccc;border-radius:20px;padding:4px 10px;align-items:center;gap:5px;font-size:11px;box-shadow:0 3px 14px rgba(0,0,0,.14);white-space:nowrap;pointer-events:auto;">
          <span id="partEditLabel" style="color:#111;font-weight:700;font-size:11px;padding-right:4px;border-right:1px solid #ddd;margin-right:2px"></span>
          <!-- 위치 섹션 (선반만) -->
          <div id="posEditSection" style="display:none;align-items:center;gap:3px;padding-right:6px;border-right:1px solid #ddd;margin-right:2px">
            <span style="color:#888;font-size:10px">↕</span>
            <input id="shelfPosInput" type="number" min="0" step="1"
              style="width:52px;padding:2px 5px;border:1.5px solid #888;border-radius:10px;font-size:12px;font-weight:700;text-align:center;font-family:inherit;-moz-appearance:textfield;background:white;"
              oninput="applyShelfPosInput(this.value)" onchange="applyShelfPosInput(this.value)">
            <span style="color:#888;font-size:10px">mm</span>
            <button onclick="nudgeShelf(-10)" style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">−10</button>
            <button onclick="nudgeShelf(-1)"  style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">−1</button>
            <button onclick="nudgeShelf(+1)"  style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">+1</button>
            <button onclick="nudgeShelf(+10)" style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">+10</button>
            <span id="shelfPosRange" style="color:#bbb;font-size:10px;margin-left:1px"></span>
          </div>
          <!-- 깊이 단차 -->
          <span style="color:#444;font-size:10px;font-weight:600">단차</span>
          <input id="depthOffsetInput" type="number" step="1"
            style="width:48px;padding:2px 5px;border:1.5px solid #888;border-radius:10px;font-size:12px;font-weight:700;text-align:center;font-family:inherit;-moz-appearance:textfield;background:white;"
            oninput="applyDepthOffset(this.value)" onchange="applyDepthOffset(this.value)">
          <span style="color:#888;font-size:10px">mm</span>
          <button onclick="nudgeDepthOffset(-5)" style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">−5</button>
          <button onclick="nudgeDepthOffset(-1)" style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">−1</button>
          <button onclick="nudgeDepthOffset(+1)" style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">+1</button>
          <button onclick="nudgeDepthOffset(+5)" style="padding:1px 5px;border:1px solid #ddd;border-radius:8px;background:white;font-size:10px;cursor:pointer;font-family:inherit;color:#444">+5</button>
          <span id="depthRefLabel" style="color:#aaa;font-size:10px;margin-left:2px"></span>
        </div>
      </div>

      <div class="tab-pane" id="paneParts">
        <div class="parts-wrap">
          <div class="parts-header">
            <h2>자재 재단 목록</h2>
            <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
          </div>
          <div class="assembly-note" id="assemblyNote"></div>
          <table class="parts">
            <thead>
              <tr>
                <th>#</th><th>부재명</th><th>수량</th>

function switchTab(t) {

  });

function triggerCornerAnim(which) {

function scheduleAnim() {
  if (!_animRAF)
    _animRAF = requestAnimationFrame(() => { _animRAF = null; draw(); });
}

function syncSize(key, raw) {
  const v=parseInt(raw); if(isNaN(v)) return;
  S[key]=v;

  draw(); if(document.getElementById('paneParts').classList.contains('active')) renderParts();
}
function sizeStr(){
  const dado = S.backJoint==='dado'
    ? `  ┃  홈 W${S.dadoW}×D${S.dadoD} @${S.dadoPos}mm` : '';
  return `W ${S.w} × H ${S.h} × D ${S.d} mm  |  두께 ${S.T}mm / 후판 ${S.backT}mm${dado}`;
}
function dadoNoteStr(){
  const {w:W,h:H,d:D,T,dadoW,dadoD,dadoPos,backT} = S;
  const bW_base = (W-2*T) + 2*dadoD;
  const bH_base = (H-2*T) + 2*dadoD;
  const bW = bW_base - 2;
  const bH = bH_base - 2;
  const shelfD = D - dadoPos - dadoW;
  const warn  = dadoD > T/2   ? ` ⚠ 홈 깊이 T÷2(${Math.round(T/2)}mm) 초과` : '';
  const warnW = dadoW !== backT ? ` ⚠ 홈 너비(${dadoW})≠후판두께(${backT})` : '';
  const warnS = shelfD <= 0   ? ` ⚠ 배면여백+홈폭이 D를 초과!` : '';
  return `후판 재단: <b>${bW} × ${bH}mm</b>  <span style="color:#888;font-weight:400">(${bW_base}×${bH_base} − 조립여유2mm)</span><br>` +
    `<b>선반·칸막이·서랍 유효 깊이: D(${D}) − ${dadoPos} − ${dadoW} = <span style="color:#555">${shelfD}mm</span></b>` +
    `${warn}${warnW}${warnS}`;
}
function svgDadoDiagram(){
  const {T, dadoW, dadoD, dadoPos} = S;
  const svgW=270, svgH=158;
  const ML=14, MR=52, MT=28, MB=36;
  const drawW=svgW-ML-MR, drawH=svgH-MT-MB;
  const extra=Math.max(20, Math.round(dadoPos*0.6));
  const totalMm=dadoPos+dadoW+extra;
  const scX=drawW/totalMm;
  const scY=drawH/Math.max(T,1);
  const px0=ML, py0=MT, pw=drawW, ph=drawH;
  const gx1=px0+dadoPos*scX;
  const gx2=px0+(dadoPos+dadoW)*scX;
  const gdepth=Math.max(dadoD*scY, 16);
  const gy1=py0+ph-gdepth, gy2=py0+ph;
  const R='#555';
  const fa=`font-size="10" font-weight="700" font-family="'Malgun Gothic',sans-serif" fill="${R}"`;
  const ext=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${R}" stroke-width="1" stroke-dasharray="2.5,2" opacity="0.7"/>`;
  const arr=(x1,y1,x2,y2)=>`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${R}" stroke-width="1.5" marker-start="url(#da)" marker-end="url(#da)"/>`;
  const bp_y=py0+ph+16, aw_y=py0-14, ad_x=gx2+14;
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="da" markerWidth="7" markerHeight="7" refX="6.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,0.5 L6.5,3.5 L0,6.5 Z" fill="${R}"/>
    </marker>
    <pattern id="wd" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#ddd4c0"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#b09060" stroke-width="1.7"/>
    </pattern>
  </defs>
  <rect x="${px0}" y="${py0}" width="${pw}" height="${ph}" fill="url(#wd)" stroke="#888" stroke-width="1.5"/>
  <rect x="${gx1.toFixed(1)}" y="${gy1.toFixed(1)}" width="${Math.max(gx2-gx1,3).toFixed(1)}" height="${gdepth.toFixed(1)}" fill="white" stroke="#555" stroke-width="1"/>
  <line x1="${px0}" y1="${py0}" x2="${px0}" y2="${py0+ph}" stroke="#222" stroke-width="3"/>
  ${ext(px0,py0+ph+2,px0,bp_y+2)}
  ${ext(gx1.toFixed(1),py0+ph+2,gx1.toFixed(1),bp_y+2)}
  ${arr(px0+3,bp_y,gx1-3,bp_y)}
  <text x="${((px0+gx1)/2).toFixed(1)}" y="${bp_y+13}" text-anchor="middle" ${fa}>${dadoPos}mm</text>
  ${ext(gx1.toFixed(1),py0-2,gx1.toFixed(1),aw_y-2)}
  ${ext(gx2.toFixed(1),py0-2,gx2.toFixed(1),aw_y-2)}
  ${arr(gx1+3,aw_y,gx2-3,aw_y)}
  <text x="${((gx1+gx2)/2).toFixed(1)}" y="${aw_y-4}" text-anchor="middle" ${fa}>${dadoW}mm</text>
  ${ext((gx2+2).toFixed(1),gy1.toFixed(1),(ad_x+2).toFixed(1),gy1.toFixed(1))}
  ${ext((gx2+2).toFixed(1),gy2.toFixed(1),(ad_x+2).toFixed(1),gy2.toFixed(1))}
  ${arr(ad_x,gy1+3,ad_x,gy2-3)}
  <text x="${ad_x+7}" y="${((gy1+gy2)/2+4).toFixed(1)}" text-anchor="start" ${fa}>${dadoD}mm</text>
  </svg>`;
}

function ensureCols() {
  while(S.cols.length<S.vCols) S.cols.push({type:'shelf',shelves:3,drawers:0});
  S.cols.length=S.vCols;
  // 각 칸의 선반 위치 비율 초기화 (shelfPos: 칸 내부 높이에서 선반 중심의 비율)
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    const n=(c.type==='shelf'||c.type==='mixed')?(c.shelves||0):0;
    if(c.equalDiv && n>0)
      c.shelfPos=Array.from({length:n},(_,i)=>(i+1)/(n+1)); // 등간격 강제
    else if(!c.shelfPos||c.shelfPos.length!==n)
      c.shelfPos=Array.from({length:n},(_,i)=>(i+1)/(n+1));
  }
  // 수직 칸막이 위치·타입 초기화
  const nDiv=S.vCols-1;
  if(!S.vDivPos||S.vDivPos.length!==nDiv)
    S.vDivPos=Array.from({length:nDiv},(_,i)=>(i+1)/S.vCols);
  if(!S.vDivTypes||S.vDivTypes.length!==nDiv)
    S.vDivTypes=Array.from({length:nDiv},()=>'fixed');
  // 각 칸 선반 타입·깊이오프셋 배열 초기화
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    const n=(c.type==='shelf'||c.type==='mixed')?(c.shelves||0):0;
    const def=c.shelfType||'fixed';
    if(!c.shelfTypes||c.shelfTypes.length!==n)
      c.shelfTypes=Array.from({length:n},()=>def);
    if(!c.shelfDepthOffsets||c.shelfDepthOffsets.length!==n)
      c.shelfDepthOffsets=Array.from({length:n},(_,i)=>c.shelfDepthOffsets?.(i)||0);
  }
  // 수직 칸막이 깊이오프셋
  const nDiv2=S.vCols-1;
  if(!S.vDivDepthOffsets||S.vDivDepthOffsets.length!==nDiv2)
    S.vDivDepthOffsets=Array.from({length:nDiv2},(_,i)=>S.vDivDepthOffsets?.(i)||0);
}
function setVCols(n) { S.vCols=n; S.vDivPos=[]; S.vDivTypes=[]; S.vDivDepthOffsets=[]; ensureCols(); render(); }
function setColType(i,t) {
  S.cols[i].type=t;
  if(t==='drawer'&&!S.cols[i].drawers) S.cols[i].drawers=3;
  if(t==='mixed'){S.cols[i].shelves=S.cols[i].shelves||2;S.cols[i].drawers=S.cols[i].drawers||2;}
  const n=(t==='shelf'||t==='mixed')?(S.cols[i].shelves||0):0;
  S.cols[i].shelfPos=Array.from({length:n},(_,j)=>(j+1)/(n+1));
  S.cols[i].shelfTypes=Array.from({length:n},()=>'fixed');
  S.cols[i].shelfDepthOffsets=Array.from({length:n},()=>0);
  renderColConfigs(); draw();
  if(document.getElementById('paneParts').classList.contains('active')) renderParts();
}
function setColShelves(i,v){
  const n=parseInt(v)||0;
  const prevT=S.cols[i].shelfTypes||[];
  const prevD=S.cols[i].shelfDepthOffsets||[];
  S.cols[i].shelves=n;
  // equalDiv이면 항상 등간격, 아니면 등간격 초기값
  S.cols[i].shelfPos=Array.from({length:n},(_,j)=>(j+1)/(n+1));
  S.cols[i].shelfTypes=Array.from({length:n},(_,j)=>prevT[j]||'fixed');
  S.cols[i].shelfDepthOffsets=Array.from({length:n},(_,j)=>prevD[j]||0);
  renderColConfigs(); draw();
  if(document.getElementById('paneParts').classList.contains('active'))renderParts();
}
function toggleShelfType(ci,si){
  const c=S.cols[ci];
  if(!c.shelfTypes||si>=c.shelfTypes.length) return;
  c.shelfTypes[si]=c.shelfTypes[si]==='fixed'?'adj':'fixed';
  renderColConfigs(); draw();
}
function toggleEqualDiv(ci){
  const c=S.cols[ci];
  c.equalDiv=!c.equalDiv;
  if(c.equalDiv){
    const n=c.shelves||0;
    c.shelfPos=Array.from({length:n},(_,j)=>(j+1)/(n+1));
  }
  renderColConfigs(); draw();
  if(document.getElementById('paneParts').classList.contains('active'))renderParts();
}
function setColDrawers(i,v){S.cols[i].drawers=parseInt(v)||1; draw(); if(document.getElementById('paneParts').classList.contains('active'))renderParts();}

function render() {
  document.getElementById('progBar').innerHTML=Array.from({length:TOTAL},(_,i)=>
    `<div class="prog-seg ${i<S.step?'done':i===S.step?'active':''}"></div>`
  ).join('');
  document.getElementById('btnPrev').style.display=S.step===0?'none':'';
  document.getElementById('btnNext').textContent=S.step===TOTAL-1?'완료':'다음 →';
  document.getElementById('btnNext').disabled=(S.step===0&&!S.type);
  [step0,step1,step3joint,step2,step4,step5][S.step](document.getElementById('stepBody'));
  document.getElementById('surveyScroll').scrollTop=0;
  draw();
  if(document.getElementById('paneParts').classList.contains('active')) renderParts();
}

function step0(el) {
  el.innerHTML=`
    <div class="step-label">STEP 1 / ${TOTAL}</div>
    <div class="step-title">가구 종류를 선택하세요</div>

function mkSlider(key, label, min, max) {
  const step = key==='d' ? 5 : 10;
  return `<div class="size-input-wrap">

    <div class="size-input-row">

      <input id="nm_${key}" class="size-num" type="number" value="${S[key]}" min="${min}" max="${max}"
        onfocus="this.select()"
        oninput="syncSize('${key}',this.value)"
        onchange="syncSize('${key}',this.value)"
        onkeydown="if(event.key==='Enter'){this.blur();syncSize('${key}',this.value);}">
      <button class="step-btn" onmousedown="startStep('${key}',${step},event)" onmouseup="stopStep()" onmouseleave="stopStep()">+</button>
    </div>
    <input id="sl_${key}" class="size-slider" type="range" min="${min}" max="${max}" value="${S[key]}"
      oninput="syncSize('${key}',this.value)">
  </div>`;

let _stepTimer=null, _stepRAF=null;
function startStep(key, delta, e) {
  e.preventDefault();
  function doStep(){
    const nm=document.getElementById('nm_'+key);
    const min=parseInt(nm.min), max=parseInt(nm.max);
    const v=Math.min(max, Math.max(min, (parseInt(nm.value)||S[key]) + delta));
    syncSize(key, v);
    nm.classList.add('changed');
    setTimeout(()=>nm.classList.remove('changed'),200);
  }
  doStep();
  _stepTimer=setTimeout(()=>{
    function loop(){ doStep(); _stepRAF=requestAnimationFrame(loop); }
    loop();
  }, 400);
}
function stopStep(){
  clearTimeout(_stepTimer); _stepTimer=null;
  if(_stepRAF){ cancelAnimationFrame(_stepRAF); _stepRAF=null; }
}

function svgJointIcon(pos, type) {
  const W=110, H=76, T=11;
  const sx=8, ex=W-8-T;          // 좌·우 측판 x
  const topY=6, botY=H-6-T;      // 상판·지판 y

  // 측판 높이 범위
  let sy1, sy2;
  if (pos==='top') {
    sy1 = type==='over'  ? topY+T : topY;
    sy2 = H-6;
  } else {
    sy1 = 6;
    sy2 = type==='under' ? botY   : H-6;
  }

  // 수평 패널 x 범위
  const isSpanning = (pos==='top' && type==='over') || (pos==='bottom' && type==='under');
  const hx = isSpanning ? sx      : sx+T;
  const hw = isSpanning ? ex+T-sx : ex-sx-T;
  const hy = pos==='top' ? topY   : botY;

  // 측판 stroke (보조 — 가는 선)
  const ss = `fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"`;
  // 수평 패널 stroke (주요 — 굵은 선)
  const ps = `fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"`;

  let d='';
  // 좌측판
  d+=`<rect x="${sx}"  y="${sy1}" width="${T}" height="${sy2-sy1}" ${ss}/>`;
  // 우측판
  d+=`<rect x="${ex}"  y="${sy1}" width="${T}" height="${sy2-sy1}" ${ss}/>`;
  // 수평 패널 (상판 or 지판) — 강조
  d+=`<rect x="${hx}" y="${hy}" width="${hw}" height="${T}" ${ps}/>`;

  // 내부 구분선 힌트 (공간감)
  if (pos==='top') {
    d+=`<line x1="${sx+T}" y1="${hy+T+8}" x2="${ex}" y2="${hy+T+8}" stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
    d+=`<line x1="${sx+T}" y1="${hy+T+20}" x2="${ex}" y2="${hy+T+20}" stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
  } else {
    d+=`<line x1="${sx+T}" y1="${hy-8}"  x2="${ex}" y2="${hy-8}"  stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
    d+=`<line x1="${sx+T}" y1="${hy-20}" x2="${ex}" y2="${hy-20}" stroke="currentColor" stroke-width="1" opacity="0.15"/>`;
  }

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${d}</svg>`;
}

function jointSummary() {
  const {w:W, h:H, d:D, T, topJoint, bottomJoint} = S;

// ── Parts calculation ─────────────────────────────────
function calcParts() {
  const {w:W, h:H, d:D, T, backT, vCols, cols, hasDoor, doorType, topJoint, bottomJoint,
         backJoint, dadoW, dadoD, dadoPos} = S;
  const r = v => Math.round(v * 10) / 10;
  const isDado = backJoint === 'dado';
  const dadoSpec = isDado ? `  [홈 W${dadoW}×D${dadoD} @${dadoPos}mm배면]` : '';

  // ── 샌드방향에 따른 치수 계산 ─────────────────────
  // 측판 높이: 올라탐/아래형일 때 해당 방향으로 T만큼 감소
  const sideH  = H - (topJoint==='over'    ? T : 0)
                   - (bottomJoint==='under' ? T : 0);
  // 상판 폭: 끼움=W-2T, 올라탐=W
  const topW   = topJoint==='over'    ? W       : W - 2*T;
  // 하판 폭: 끼움=W-2T, 아래=W
  const botW   = bottomJoint==='under'? W       : W - 2*T;
  // 내부 폭 (선반·칸막이): 항상 W-2T
  const innerW = W - 2*T;
  // 내부 높이: 항상 H-2T (상하판 두께 제외)
  const innerH = H - 2*T;
  const colInnerW = r((innerW - (vCols-1)*T) / vCols);

  const topNote    = topJoint==='over'
    ? `올라탐형: W전체(${W})`
    : `끼움형: W(${W})-측판2×T(${2*T}) = ${topW}`;
  const botNote    = bottomJoint==='under'
    ? `아래형: W전체(${W})`
    : `끼움형: W(${W})-측판2×T(${2*T}) = ${botW}`;
  const sideNote   = `H(${H})${topJoint==='over'?`-상판T(${T})`:''}${bottomJoint==='under'?`-지판T(${T})`:''} = ${sideH}`;

  const parts = [];

  // 1. 측판
  parts.push({ g:'box', name:'측판', qty:2,
    w: D, h: r(sideH), t: T, note: sideNote + dadoSpec });

  // 2. 상판 (깊이 단차 적용)
  const topD = D + (S.topDepthOffset||0);
  const topDNote = S.topDepthOffset ? ` [단차 ${S.topDepthOffset>0?'+':''}${S.topDepthOffset}mm → 실제 ${topD}mm]` : '';
  parts.push({ g:'box', name:'상판', qty:1,
    w: r(topW), h: topD, t: T, note: topNote + dadoSpec + topDNote });

  // 3. 하판(지판) (깊이 단차 적용)
  const botD = D + (S.botDepthOffset||0);
  const botDNote = S.botDepthOffset ? ` [단차 ${S.botDepthOffset>0?'+':''}${S.botDepthOffset}mm → 실제 ${botD}mm]` : '';
  parts.push({ g:'box', name:'지판 (하판)', qty:1,
    w: r(botW), h: botD, t: T, note: botNote + dadoSpec + botDNote });

  // 4. 후판 (dado 모드: 홈 깊이만큼 폭·높이 증가, 조립 여유 각 -2mm)
  const backW_base = isDado ? r(innerW + 2*dadoD) : r(innerW);
  const backH_base = isDado ? r(innerH + 2*dadoD) : r(innerH);
  const backW = backW_base - 2;
  const backH = backH_base - 2;
  const backNote = isDado
    ? `홈 삽입: 유효면+삽입부 ${backW_base}×${backH_base} → 조립여유(-2) → ${backW}×${backH}`
    : `내부면 ${backW_base}×${backH_base} → 조립여유(-2) → ${backW}×${backH}`;
  parts.push({ g:'box', name:'후판', qty:1,
    w: backW, h: backH, t: backT, note: backNote });

  // ── 내부 부재 유효 깊이 (후판 앞면까지의 거리) ──────────
  // 나사 고정: 후판이 배면에 밀착 → 유효깊이 = D - backT
  // 홈 삽입:   후판이 dadoPos+dadoW 위치에 있음 → 유효깊이 = D - dadoPos - dadoW
  const innerD = isDado ? r(D - dadoPos - dadoW) : r(D - backT);
  const innerDNote = isDado
    ? `D(${D}) - 배면여백(${dadoPos}) - 홈폭(${dadoW}) = ${innerD}`
    : `D(${D}) - 후판(${backT}) = ${innerD}`;

  // 5. 수직 칸막이 (깊이 단차 적용)
  if (vCols > 1) {
    for(let di=0; di<vCols-1; di++){
      const dvt = (S.vDivTypes||[])[di]==='adj' ? '  [이동형-선반핀]' : '  [고정형]';
      const dvOff = (S.vDivDepthOffsets||[])[di]||0;
      const dvD = innerD + dvOff;
      const dvOffNote = dvOff ? ` [단차 ${dvOff>0?'+':''}${dvOff}mm → ${dvD}mm]` : '';
      const divNote = isDado
        ? `${innerDNote}  [배면 홈 W${dadoW}×D${dadoD}]${dvt}${dvOffNote}`
        : `깊이(${D}) - 후판(${backT}) = ${innerD}${dvt}${dvOffNote}`;
      parts.push({ g:'div', name:`수직 칸막이${vCols>2?` ${di+1}`:''}`, qty:1,
        w: dvD, h: r(innerH), t: T, note: divNote });
    }
  }

  // 6. 칸별 부재
  const LBL = ['A','B','C','D'];
  for (let ci=0; ci<vCols; ci++) {
    const c   = cols[ci];
    const lbl = vCols>1 ? ` (${LBL[ci]}칸)` : '';
    const cW  = colInnerW;
    const cH  = r(innerH);

    const _stypes=c.shelfTypes||[];
    const _nAdj=_stypes.filter(t=>t==='adj').length;
    const _nFixed=_stypes.length-_nAdj;
    const stNote=_stypes.length===0?'':_nAdj===0?'  [전체 고정형]':_nFixed===0?'  [전체 이동형-선반핀]':`  [고정형×${_nFixed} / 이동형×${_nAdj}]`;
    if (c.type === 'shelf') {
      const n = c.shelves||0;
      if (n>0){
        // 깊이 단차별로 그룹핑
        const depthMap=new Map();
        for(let si=0;si<n;si++){
          const off=(c.shelfDepthOffsets&&c.shelfDepthOffsets[si])||0;
          const d=r(innerD+off);
          const typeStr=(c.shelfTypes&&c.shelfTypes[si])||'fixed';
          const key=`${d}_${typeStr}`;
          if(!depthMap.has(key)) depthMap.set(key,{d,off,typeStr,cnt:0});
          depthMap.get(key).cnt++;
        }
        for(const {d,off,typeStr,cnt} of depthMap.values()){
          const tNote=typeStr==='adj'?'  [이동형-선반핀]':'  [고정형]';
          const oNote=off?` [단차 ${off>0?'+':''}${off}mm]`:'';
          parts.push({ g:'shelf', name:`선반${lbl}`, qty:cnt,
            w: cW, h: d, t: T,
            note:`유효깊이(${innerDNote})${oNote}${tNote}` });
        }
      }

    } else if (c.type === 'drawer') {
      const n   = Math.max(1, c.drawers||2);
      const dFH = r(innerH/n - 4);
      const dBH = r(dFH - T);
      const dBW = r(innerD - T - 20); // 서랍 박스 깊이: 유효깊이 - 전면판T - 레일여유
      parts.push({ g:'drawer', name:`서랍 전면판${lbl}`, qty:n,
        w: cW, h: dFH, t: T,
        note:`${n}단 균등: (${cH}÷${n}) - 4mm 갭` });
      parts.push({ g:'drawer', name:`서랍 측판${lbl}`, qty:n*2,
        w: dBW, h: dBH, t: T,
        note:`유효깊이(${innerD})-T(${T})-레일20 = ${dBW}` });
      parts.push({ g:'drawer', name:`서랍 앞·뒷판${lbl}`, qty:n*2,
        w: r(cW - 2*T), h: dBH, t: T,
        note:`칸폭(${cW})-T×2(${2*T}) = ${r(cW-2*T)}` });
      parts.push({ g:'drawer', name:`서랍 바닥판${lbl}`, qty:n,
        w: r(cW - 2*T), h: dBW, t: backT,
        note:`후판 두께(${backT}) 사용` });

    } else if (c.type === 'mixed') {
      const topH  = r(cH * 0.55);
      const botH  = r(cH - topH);
      // 구분판
      parts.push({ g:'div', name:`혼합 구분판${lbl}`, qty:1,
        w: cW, h: innerD, t: T,
        note:`선반/서랍 경계  유효깊이(${innerDNote})` });
      // 선반 (깊이 단차 그룹핑)
      const ns = c.shelves||2;
      if (ns>0){
        const depthMapM=new Map();
        for(let si=0;si<ns;si++){
          const off=(c.shelfDepthOffsets&&c.shelfDepthOffsets[si])||0;
          const d=r(innerD+off);
          const typeStr=(c.shelfTypes&&c.shelfTypes[si])||'fixed';
          const key=`${d}_${typeStr}`;
          if(!depthMapM.has(key)) depthMapM.set(key,{d,off,typeStr,cnt:0});
          depthMapM.get(key).cnt++;
        }
        for(const {d,off,typeStr,cnt} of depthMapM.values()){
          const tNote=typeStr==='adj'?'  [이동형-선반핀]':'  [고정형]';
          const oNote=off?` [단차 ${off>0?'+':''}${off}mm]`:'';
          parts.push({ g:'shelf', name:`선반${lbl}`, qty:cnt,
            w: cW, h: d, t: T,
            note:`상단구역 유효깊이(${innerDNote})${oNote}${tNote}` });
        }
      }
      // 서랍 박스
      const nd   = Math.max(1, c.drawers||2);
      const dFH2 = r(botH/nd - 4);
      const dBH2 = r(dFH2 - T);
      const dBW2 = r(innerD - T - 20);
      parts.push({ g:'drawer', name:`서랍 전면판${lbl}`, qty:nd,
        w: cW, h: dFH2, t: T,
        note:`하단 ${botH}mm, ${nd}단` });
      parts.push({ g:'drawer', name:`서랍 측판${lbl}`, qty:nd*2,
        w: dBW2, h: dBH2, t: T,
        note:`유효깊이(${innerD})-T(${T})-레일20 = ${dBW2}` });
      parts.push({ g:'drawer', name:`서랍 앞·뒷판${lbl}`, qty:nd*2,
        w: r(cW - 2*T), h: dBH2, t: T,
        note:`서랍 박스 앞뒤` });
      parts.push({ g:'drawer', name:`서랍 바닥판${lbl}`, qty:nd,
        w: r(cW - 2*T), h: dBW2, t: backT,
        note:`얇은 판재 사용` });
    }
    // open: no additional parts
  }

  // 7. 문
  if (hasDoor) {
    if (doorType==='swing') {
      const doorW = r(W / vCols);
      parts.push({ g:'door', name:'문 (여닫이)', qty:vCols,
        w: doorW, h: H, t: T,
        note:`W÷칸수 = ${doorW} (풀오버레이)` });
    } else {
      const slideW = r(W * 0.55);
      parts.push({ g:'door', name:'문 (미닫이)', qty:2,
        w: slideW, h: H, t: T,
        note:`W×55% = ${slideW} (오버랩)` });
    }
  }

  return parts;
}

// ── Render parts table ────────────────────────────────
function renderParts() {
  const {w:W, h:H, d:D, T, backT, vCols} = S;
  const parts = calcParts();

  const colInnerW = Math.round(((W-2*T-(vCols-1)*T)/vCols)*10)/10;
  const {topJoint, bottomJoint} = S;
  const sideHd = H - (topJoint==='over'?T:0) - (bottomJoint==='under'?T:0);
  const topWd  = topJoint==='over'    ? W : W-2*T;
  const botWd  = bottomJoint==='under'? W : W-2*T;
  const isDadoR = S.backJoint === 'dado';
  const {dadoW:dW, dadoD:dD, dadoPos:dP} = S;
  const backWr = (isDadoR ? (W-2*T)+2*dD : W-2*T) - 2;
  const backHr = (isDadoR ? (H-2*T)+2*dD : H-2*T) - 2;
  document.getElementById('assemblyNote').innerHTML =
    `<strong>샌드방향:</strong>
     상판 <b>${topJoint==='over'?'올라탐형':'끼움형'}</b> &nbsp;|&nbsp;
     지판 <b>${bottomJoint==='under'?'아래형':'끼움형'}</b><br>
     측판: ${D} × <b>${sideHd}</b> × T${T} &nbsp;|&nbsp;
     상판: <b>${topWd}</b> × ${D} × T${T} &nbsp;|&nbsp;
     지판: <b>${botWd}</b> × ${D} × T${T} &nbsp;|&nbsp;
     후판: <b>${backWr} × ${backHr}</b> × T${backT}<br>
     칸 내부 폭 = (${W} − 2×${T}${vCols>1?` − ${vCols-1}×${T}`:''}) ÷ ${vCols}
     = <strong>${colInnerW}mm</strong>
     ${isDadoR?`<br><span style="color:#333">▪ 후판 홈 삽입: W${dW}×D${dD} @배면${dP}mm — 선반·칸막이·서랍 유효깊이 = ${D}-${dP}-${dW} = <b>${D-dP-dW}mm</b></span>`:''}
    `;

  const GCLS = {box:'',shelf:'g-shelf',door:'g-door',drawer:'g-drawer',div:'g-div'};
  let totalQty=0;
  document.getElementById('partsBody').innerHTML =
    parts.map((p,i)=>{
      totalQty+=p.qty;
      return `<tr class="${GCLS[p.g]||''}">
        <td>${i+1}</td>
        <td style="text-align:left;font-weight:600">${p.name}</td>
        <td><strong>${p.qty}</strong></td>
        <td><span class="dim-chip">${f(p.w)}</span></td>
        <td><span class="dim-chip">${f(p.h)}</span></td>
        <td>${p.t}</td>
        <td style="font-size:11px;color:#888;text-align:left">${p.note}</td>
      </tr>`;
    }).join('')
    + `<tr class="g-total">
        <td colspan="2">합 계</td>
        <td>${totalQty}</td>
        <td colspan="4" style="text-align:left;font-size:11px">
          총 ${parts.length}종 ${totalQty}개
        </td>
       </tr>`;
}

function f(v) { return Number.isInteger(v) ? v : v.toFixed(1); }

// ── CSV Export ────────────────────────────────────────
function exportCSV() {
  const {w,h,d,T,backT}=S;
  const parts=calcParts();
  let csv=`가구 자재 재단 목록\nW=${w} H=${h} D=${d} 본체두께=${T}mm 후판두께=${backT}mm\n\n`;
  csv+='번호,부재명,수량,가로(mm),세로(mm),두께(mm),비고\n';
  parts.forEach((p,i)=>{csv+=`${i+1},${p.name},${p.qty},${f(p.w)},${f(p.h)},${p.t},${p.note}\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`자재목록_W${w}xH${h}xD${d}_T${T}.csv`;
  a.click();
}

// ── Canvas drawing ────────────────────────────────────
function draw() {
  if(!document.getElementById('paneDraw').classList.contains('active')) {
    showCornerPopups([]); return;
  }
  const wrap=document.getElementById('cvWrap');
  const canvas=document.getElementById('cv');
  const PAD=52;
  const sc=Math.min((wrap.clientWidth-48-PAD*2)/S.w,(wrap.clientHeight-48-PAD*2)/S.h,2);
  const fw=S.w*sc, fh=S.h*sc;
  canvas.width=fw+PAD*2; canvas.height=fh+PAD*2;

  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);

  const ox=PAD, oy=PAD;
  const Tpx=S.T*sc;

  // ── 샌드방향에 따른 측판·상판·지판 위치 계산 ─────────
  const topOver  = S.topJoint    === 'over';
  const botUnder = S.bottomJoint === 'under';
  const sideY1   = oy + (topOver  ? Tpx : 0);
  const sideY2   = oy + fh - (botUnder ? Tpx : 0);
  const sideHpx  = sideY2 - sideY1;
  const topX     = topOver  ? ox      : ox + Tpx;
  const topW_px  = topOver  ? fw      : fw - 2*Tpx;
  const botX     = botUnder ? ox      : ox + Tpx;
  const botW_px  = botUnder ? fw      : fw - 2*Tpx;

  // ── 끼움형 상판/지판 위치 오프셋 (드래그 이동) ────────
  const topOffPx = (S.topJoint==='between') ? (S.topPanelPos||0)*sideHpx : 0;
  const botOffPx = (S.bottomJoint==='between') ? (S.botPanelPos||0)*sideHpx : 0;
  const topPanelY = oy + topOffPx;              // 상판 윗면 y
  const botPanelY = oy + fh - Tpx - botOffPx;  // 지판 윗면 y

  // ── 내부 영역 픽셀 좌표 (오프셋 반영) ────────────────
  const innerXstart = ox + Tpx;
  const innerXend   = ox + fw - Tpx;
  const innerWpx    = innerXend - innerXstart;
  const cy1 = topPanelY + Tpx;   // 상판 아랫면 y
  const cy2 = botPanelY;          // 지판 윗면 y
  const iH  = cy2 - cy1;

  // ── 수직 칸막이 중심 위치 (vDivPos 비율 → 픽셀) ───────
  ensureCols();
  const divCenters = (S.vDivPos||[]).map(f => innerXstart + f * innerWpx);

  // ── 열(column) 픽셀 경계 ────────────────────────────
  const colBounds = [];
  for(let ci=0;ci<S.vCols;ci++){
    const cx1 = ci===0          ? innerXstart          : divCenters[ci-1] + Tpx/2;
    const cx2 = ci===S.vCols-1 ? innerXend             : divCenters[ci]   - Tpx/2;
    colBounds.push({cx1, cx2});
  }

  // ── 마우스 인터랙션용 좌표 상태 저장 ─────────────────
  _cs = {ox, oy, sc, fw, fh, Tpx, innerXstart, innerXend, innerWpx,
         colBounds, cy1, cy2, sideHpx, sideY1, sideY2,
         topPanelY, botPanelY, topX, topW_px, botX, botW_px};

  // ── 부속 상태 헬퍼 (hover/sel → fill/stroke) ──
  function partState(type, sub) {
    const isSel = _sel   && _sel.type===type   && (_sel.side===sub  || sub==null);
    const isHov = _hover && _hover.type===type && (_hover.side===sub || sub==null);
    if (isSel) return {fill:'#e0e0e0', stroke:'#000'};
    if (isHov) return {fill:'#efefef', stroke:'#444'};
    return null;
  }
  function drawPanel(x, y, w, h, baseCol, type, sub) {
    const st = partState(type, sub);
    let fill = st ? st.fill : (_partColor && PART_COLORS[type] ? PART_COLORS[type].fill : baseCol);
    let stroke = st ? st.stroke : (_partColor && PART_COLORS[type] ? PART_COLORS[type].stroke : '#555');
    ctx.fillStyle = fill;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 0.8;
    ctx.strokeRect(x, y, w, h);
  }

  // ── 상판 ────────────────────────────────────────────
  drawPanel(topX, topPanelY, topW_px, Tpx, '#e2e2e2', 'topPanel');
  if(topOffPx > 4)
    drawSpaceDims(ctx, topX, oy, topW_px, topOffPx, [], Tpx, sc);

  // ── 지판(하판) ──────────────────────────────────────
  drawPanel(botX, botPanelY, botW_px, Tpx, '#e2e2e2', 'botPanel');
  if(botOffPx > 4)
    drawSpaceDims(ctx, botX, oy+fh-botOffPx, botW_px, botOffPx, [], Tpx, sc);

  // ── 측판 좌/우 ──────────────────────────────────────
  drawPanel(ox,        sideY1, Tpx, sideHpx, '#d0d0d0', 'sidePanel', 'left');
  drawPanel(ox+fw-Tpx, sideY1, Tpx, sideHpx, '#d0d0d0', 'sidePanel', 'right');

  // ── 수직 칸막이 (vDivPos 기반 위치, 고정/이동형 구분) ──
  for(let i=0;i<S.vCols-1;i++){
    const dx=divCenters[i]-Tpx/2;
    const isSelDiv=_sel&&_sel.type==='vdiv'&&_sel.idx===i;
    const isHovDiv=_hover&&_hover.type==='vdiv'&&_hover.idx===i;
    const isDivAdj=(S.vDivTypes||[])[i]==='adj';
    const pcDiv = _partColor ? (isDivAdj?PART_COLORS.vdivAdj:PART_COLORS.vdiv) : null;
    const baseDiv = isDivAdj ? '#c8c8c8' : '#d0d0d0';
    ctx.fillStyle = isSelDiv?'#e0e0e0': isHovDiv?'#efefef': (pcDiv?pcDiv.fill:baseDiv);
    ctx.fillRect(dx, cy1, Tpx, iH);
    ctx.strokeStyle=isSelDiv?'#000':isHovDiv?'#444':(pcDiv?pcDiv.stroke:(isDivAdj?'#888':'#555'));
    ctx.lineWidth=0.8;
    ctx.strokeRect(dx, cy1, Tpx, iH);
    // 이동형 칸막이: 핀홀 점 표시
    if(isDivAdj&&Tpx>4){
      const dotR=Math.max(1,Math.min(2.5,Tpx*0.18));
      const spacing=Math.max(16,28*sc);
      ctx.fillStyle=isSelDiv?'#000':isHovDiv?'#444':'#888';
      for(let dy=cy1+spacing;dy<cy2-spacing/2;dy+=spacing){
        ctx.beginPath();ctx.arc(dx+Tpx/2,dy,dotR,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // ── 칸별 내부 콘텐츠 + 공간 치수 표기 ───────────────
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    const {cx1, cx2}=colBounds[ci];
    const iW=cx2-cx1;
    const selShelfIdx=(_sel&&_sel.type==='shelf'&&_sel.ci===ci)?_sel.idx:-1;

    const shelfTypes=c.shelfTypes||[];
    if(c.type==='shelf'||c.type==='open'){
      const positions=c.type==='open'?[]:(c.shelfPos||[]);
      drawShelves(ctx,cx1,cy1,iW,iH,positions,Tpx,sc,selShelfIdx,shelfTypes,ci);
      drawSpaceDims(ctx,cx1,cy1,iW,iH,positions,Tpx,sc,c.equalDiv);
    } else if(c.type==='drawer'){
      drawDrawers(ctx,cx1,cy1,iW,iH,Math.max(1,c.drawers||2),sc);
    } else if(c.type==='mixed'){
      const splitY=cy1+iH*0.55;
      ctx.fillStyle=_partColor?PART_COLORS.shelf.fill:'#d0d0d0';
      ctx.fillRect(cx1,splitY,iW,Tpx);
      ctx.strokeStyle=_partColor?PART_COLORS.shelf.stroke:'#555'; ctx.lineWidth=0.8;
      ctx.strokeRect(cx1,splitY,iW,Tpx);
      const topH=splitY-cy1;
      const positions=c.shelfPos||[];
      drawShelves(ctx,cx1,cy1,iW,topH,positions,Tpx,sc,selShelfIdx,shelfTypes,ci);
      drawSpaceDims(ctx,cx1,cy1,iW,topH,positions,Tpx,sc,c.equalDiv);
      drawDrawers(ctx,cx1,splitY+Tpx,iW,cy2-(splitY+Tpx),Math.max(1,c.drawers||2),sc);
    }
  }

  // ── 외곽 윤곽선 ─────────────────────────────────────
  ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(ox,oy,fw,fh);

  // ── 두께 치수 표기 ────────────────────────────────
  if(Tpx>6){
    const fnt=`${Math.max(8,Math.round(sc*8))}px 'Malgun Gothic',sans-serif`;
    ctx.font=fnt; ctx.fillStyle='#777'; ctx.textAlign='center';
    ctx.fillText(`T${S.T}`, ox+Tpx+(fw-2*Tpx)/2, oy+Tpx/2+4);
    ctx.fillText(`T${S.T}`, ox+Tpx+(fw-2*Tpx)/2, oy+fh-Tpx/2+4);
    ctx.save();
    ctx.translate(ox+Tpx/2, oy+fh/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(`T${S.T}`, 0, 4); ctx.restore();
    ctx.save();
    ctx.translate(ox+fw-Tpx/2, oy+fh/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(`T${S.T}`, 0, 4); ctx.restore();
  }

  // ── 후판 홈 삽입(Dado) 시각화 ────────────────────────
  if(S.backJoint==='dado' && Tpx>6){
    const {dadoW:dW, dadoD:dD, dadoPos:dP} = S;
    const dWpx = dW*sc, dDpx = dD*sc, dPpx = dP*sc;
    // 홈은 각 판재의 내면에서 dadoD 깊이, 위치는 배면에서 dadoPos+dadoW 까지
    // 정면도에서: 판재 두께(Tpx) 안에 홈 깊이(dDpx)를 표시

    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.08)';
    ctx.strokeStyle='#555';
    ctx.lineWidth=0.8;
    ctx.setLineDash([3,2]);

    // 좌 측판 홈 (내면 기준)
    ctx.fillRect(ox+Tpx-dDpx, sideY1, dDpx, sideHpx);
    ctx.strokeRect(ox+Tpx-dDpx, sideY1, dDpx, sideHpx);
    // 우 측판 홈
    ctx.fillRect(ox+fw-Tpx, sideY1, dDpx, sideHpx);
    ctx.strokeRect(ox+fw-Tpx, sideY1, dDpx, sideHpx);
    // 상판 홈
    ctx.fillRect(topX, oy+Tpx-dDpx, topW_px, dDpx);
    ctx.strokeRect(topX, oy+Tpx-dDpx, topW_px, dDpx);
    // 지판 홈
    ctx.fillRect(botX, oy+fh-Tpx, botW_px, dDpx);
    ctx.strokeRect(botX, oy+fh-Tpx, botW_px, dDpx);

    ctx.setLineDash([]);
    ctx.restore();

    // 홈 치수 레이블 (좌 측판 기준)
    const fntSm=`${Math.max(7,Math.round(sc*7))}px 'Malgun Gothic',sans-serif`;
    ctx.font=fntSm; ctx.fillStyle='#555'; ctx.textAlign='left';
    ctx.save();
    ctx.translate(ox+Tpx-dDpx/2, sideY1+6);
    ctx.rotate(-Math.PI/2);
    ctx.fillText(`홈 ${dW}×${dD}mm`, 0, 3);
    ctx.restore();
  }

  // ── 부속별 사이즈 레이블 ─────────────────────────────
  drawPartSizeLabels(ctx,{ox,oy,fw,fh,sc,Tpx,topX,topW_px,topPanelY,botX,botW_px,botPanelY,
    sideY1,sideHpx,cy1,cy2,colBounds,iH,innerD:(S.backJoint==='dado'?S.d-S.dadoPos-S.dadoW:S.d-S.backT)});

  // ── 문 ───────────────────────────────────────────
  if(S.hasDoor){
    const ins=Math.max(5,12*sc);
    if(S.doorType==='swing'){
      for(let ci=0;ci<S.vCols;ci++){
        const dx=ci===0?ox:divCenters[ci-1];
        const dr=ci===S.vCols-1?ox+fw:divCenters[ci];
        const dw=dr-dx, isL=ci<S.vCols/2;
        ctx.strokeStyle='#444'; ctx.lineWidth=0.8; ctx.strokeRect(dx,oy,dw,fh);
        ctx.strokeStyle='#444'; ctx.lineWidth=1;   ctx.strokeRect(dx+ins,oy+ins,dw-ins*2,fh-ins*2);
        const hx=isL?dx+4:dx+dw-4; ctx.fillStyle='#666';
        for(const hy of[oy+Math.min(70*sc,fh*0.1),oy+fh-Math.min(70*sc,fh*0.1)]){
          ctx.beginPath();ctx.arc(hx,hy,Math.max(2,2.5*sc),0,Math.PI*2);ctx.fill();
        }
        if(S.handle!=='none') drawHandle(ctx,isL?dx+dw-Math.max(10,16*sc):dx+Math.max(10,16*sc),oy+fh/2,sc);
      }
    } else {
      const pW=fw*0.55;
      ctx.strokeStyle='#444';ctx.lineWidth=0.8;
      ctx.strokeRect(ox,oy,pW,fh); ctx.strokeStyle='#666';ctx.lineWidth=0.8; ctx.strokeRect(ox+ins,oy+ins,pW-ins*2,fh-ins*2);
      ctx.strokeStyle='#444';ctx.lineWidth=0.8;
      ctx.strokeRect(ox+fw-pW,oy,pW,fh); ctx.strokeStyle='#666';ctx.lineWidth=0.8; ctx.strokeRect(ox+fw-pW+ins,oy+ins,pW-ins*2,fh-ins*2);
      ctx.setLineDash([5,4]);ctx.strokeStyle='#aaa';ctx.lineWidth=1;
      L(ctx,ox+pW,oy,ox+pW,oy+fh);L(ctx,ox+fw-pW,oy,ox+fw-pW,oy+fh);
      ctx.setLineDash([]);
      if(S.handle!=='none'){drawHandle(ctx,ox+pW-Math.max(10,14*sc),oy+fh/2,sc);drawHandle(ctx,ox+fw-pW+Math.max(10,14*sc),oy+fh/2,sc);}
    }
  }

  // ── 외부 치수선 ─────────────────────────────────────
  dimH(ctx,ox,oy+fh+28,fw,`${S.w}mm`,'#333');
  dimV(ctx,ox+fw+28,oy,fh,`${S.h}mm`,'#333');
  ctx.fillStyle='#999';ctx.font=`${Math.max(9,Math.round(sc*9))}px 'Malgun Gothic',sans-serif`;ctx.textAlign='right';
  ctx.fillText(`D: ${S.d}mm  T: ${S.T}mm`,canvas.width-4,14);

  // ── 칸 내부 폭 표기 (vDivPos 기반 실제 폭) ──────────
  ctx.fillStyle='#888';ctx.font=`${Math.max(8,Math.round(sc*9))}px 'Malgun Gothic',sans-serif`;ctx.textAlign='center';
  for(let ci=0;ci<S.vCols;ci++){
    const {cx1,cx2}=colBounds[ci];
    const colWmm=Math.round((cx2-cx1)/sc);
    ctx.fillText(`${colWmm}`,( cx1+cx2)/2,oy+fh+15);
  }

  // ── 선택된 선반: 하단으로부터 거리 치수선 ─────────────
  if(_sel&&_sel.type==='shelf'){
    const {ci:sci,idx:sidx}=_sel;
    const sc2=S.cols[sci];
    if(sc2&&sc2.shelfPos&&sidx<sc2.shelfPos.length){
      const {cx1:scx1,cx2:scx2}=colBounds[sci];
      const iH2=cy2-cy1;
      const topH2=sc2.type==='mixed'?iH2*0.55:iH2;
      const pos2=sc2.shelfPos[sidx];
      const shelfBotY=cy1+pos2*topH2+Tpx/2;
      const dimLen=cy2-shelfBotY;
      if(dimLen>10){
        const ax=scx2-12;
        const fromBotMm=Math.round(dimLen/sc);
        const fntSz2=Math.max(9,Math.round(sc*10));
        const R='#555';
        ctx.save();
        // 치수선
        ctx.strokeStyle=R;ctx.fillStyle=R;ctx.lineWidth=1.5;
        ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(ax,shelfBotY);ctx.lineTo(ax,cy2);ctx.stroke();
        ctx.setLineDash([]);
        // 위 화살표 (선반 하면)
        ctx.beginPath();ctx.moveTo(ax,shelfBotY);ctx.lineTo(ax-4,shelfBotY+9);ctx.lineTo(ax+4,shelfBotY+9);ctx.closePath();ctx.fill();
        // 아래 화살표 (지판 내면)
        ctx.beginPath();ctx.moveTo(ax,cy2);ctx.lineTo(ax-4,cy2-9);ctx.lineTo(ax+4,cy2-9);ctx.closePath();ctx.fill();
        // 레이블 배지
        const midY=(shelfBotY+cy2)/2;
        ctx.font=`bold ${fntSz2}px 'Malgun Gothic',sans-serif`;
        const lbl=`${fromBotMm}`;
        const tw2=ctx.measureText(lbl).width;
        const bx2=ax-tw2/2-4,by2=midY-fntSz2+1,bw2=tw2+8,bh2=fntSz2+4;
        ctx.fillStyle='rgba(255,240,240,0.94)';
        ctx.beginPath();ctx.roundRect?ctx.roundRect(bx2,by2,bw2,bh2,3):ctx.fillRect(bx2,by2,bw2,bh2);ctx.fill();
        ctx.strokeStyle=R;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.roundRect?ctx.roundRect(bx2,by2,bw2,bh2,3):ctx.strokeRect(bx2,by2,bw2,bh2);ctx.stroke();
        ctx.fillStyle=R;ctx.textAlign='center';
        ctx.fillText(lbl,ax,midY+fntSz2/3);
        ctx.restore();
      }
    }
  }
  // ── 코너 활성 도트 (캔버스 위) + HTML 팝업 갱신 ────────
  const cornersToShow = [];

  if(_cornerAnim) {
    const elapsed = Date.now() - _cornerAnim.startTime;
    const dur = _cornerAnim.duration;
    if(elapsed >= dur) {
      _cornerAnim = null;
    } else {
      const FADE_IN=300, FADE_OUT=450;
      const a = elapsed < FADE_IN ? elapsed/FADE_IN
              : elapsed > dur-FADE_OUT ? (dur-elapsed)/FADE_OUT : 1;
      if(_cornerAnim.which==='top')
        { cornersToShow.push({corner:'topLeft',a}); cornersToShow.push({corner:'topRight',a}); }
      else
        { cornersToShow.push({corner:'botLeft',a}); cornersToShow.push({corner:'botRight',a}); }
      scheduleAnim();
    }
  }
  if(_cornerHover) {
    const ex = cornersToShow.find(c=>c.corner===_cornerHover);
    if(ex) ex.a=1; else cornersToShow.push({corner:_cornerHover, a:1});
  }

  // 캔버스에 모서리 강조 도트 그리기
  for(const {corner,a} of cornersToShow) {
    const isTop=corner.startsWith('top'), isLeft=corner.endsWith('Left');
    const dx=isLeft?ox:ox+fw, dy=isTop?oy:oy+fh;
    ctx.save(); ctx.globalAlpha=a;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(dx,dy,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // HTML 팝업 표시 (도면 외부)
  showCornerPopups(cornersToShow);

  syncShelfPosBar();
}

function L(ctx,x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

// 각 부속 치수 레이블을 캔버스에 표기 (샌드방향 반영 실시간 갱신)
function drawPartSizeLabels(ctx,p){
  const {ox,oy,fw,fh,sc,Tpx,
         topX,topW_px,topPanelY,
         botX,botW_px,botPanelY,
         sideY1,sideHpx,cy1,cy2,colBounds,iH,innerD}=p;
  if(sc<0.10) return;

  const {d:D,T,topJoint,bottomJoint}=S;
  const topW =Math.round(topW_px/sc);
  const botW =Math.round(botW_px/sc);
  const sideH=Math.round(sideHpx/sc);
  const topDv=D+(S.topDepthOffset||0);
  const botDv=D+(S.botDepthOffset||0);
  const fs=Math.max(9,Math.min(13,Math.round(sc*9)));

  // 부속 위에 [이름 / 치수] 라벨 칩 (흰 배경 + 얇은 테두리)
  function chip(cx,cy,name,dim,rot){
    ctx.save();
    if(rot){ctx.translate(cx,cy);ctx.rotate(-Math.PI/2);}
    else ctx.translate(cx,cy);
    const nameFs=Math.max(7,fs-2);
    ctx.font=`${nameFs}px 'Malgun Gothic',sans-serif`;
    const nw=ctx.measureText(name).width;
    ctx.font=`bold ${fs}px 'Malgun Gothic',sans-serif`;
    const dw=ctx.measureText(dim).width;
    const pw=Math.max(nw,dw)+10, ph=nameFs+fs+8;
    ctx.fillStyle='rgba(255,255,255,0.93)';
    ctx.strokeStyle='rgba(0,0,0,0.14)'; ctx.lineWidth=0.8;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(-pw/2,-ph/2,pw,ph,4);
    else ctx.rect(-pw/2,-ph/2,pw,ph);
    ctx.fill();ctx.stroke();
    ctx.textAlign='center';
    ctx.fillStyle='#777';
    ctx.font=`${nameFs}px 'Malgun Gothic',sans-serif`;
    ctx.fillText(name,0,-ph/2+nameFs+1);
    ctx.fillStyle='#111';
    ctx.font=`bold ${fs}px 'Malgun Gothic',sans-serif`;
    ctx.fillText(dim,0,ph/2-4);
    ctx.restore();
  }

  // 상판 (topW 값이 샌드방향에 따라 변함)
  if(Tpx>=6) chip(topX+topW_px/2, topPanelY+Tpx/2, '상판', `${topW}×${topDv}`, Tpx<14);
  // 지판 (botW 값이 샌드방향에 따라 변함)
  if(Tpx>=6) chip(botX+botW_px/2, botPanelY+Tpx/2, '지판', `${botW}×${botDv}`, Tpx<14);
  // 측판 좌 (sideH 값이 샌드방향에 따라 변함)
  if(Tpx>=5) chip(ox+Tpx/2, sideY1+sideHpx/2, '측판', `${D}×${sideH}`, true);
  // 수직 칸막이
  const innerXs=ox+Tpx, innerWp=fw-2*Tpx;
  const dcs=(S.vDivPos||[]).map(f=>innerXs+f*innerWp);
  for(let i=0;i<S.vCols-1;i++){
    const dvOff=(S.vDivDepthOffsets||[])[i]||0;
    const dvD=Math.round(innerD+dvOff);
    chip(dcs[i],cy1+iH/2,'칸막이',`${dvD}×${Math.round(iH/sc)}`,true);
  }
  // 선반: 단차 있는 것만 표기
  ctx.save();
  ctx.font=`bold ${Math.max(7,fs-2)}px 'Malgun Gothic',sans-serif`;
  ctx.fillStyle='rgba(80,80,80,0.88)'; ctx.textAlign='right';
  for(let ci=0;ci<S.vCols;ci++){
    const c=S.cols[ci];
    if(!c.shelfPos||!c.shelfPos.length) continue;
    const {cx1,cx2}=colBounds[ci];
    const cH=c.type==='mixed'?iH*0.55:iH;
    for(let si=0;si<c.shelfPos.length;si++){
      const off=(c.shelfDepthOffsets&&c.shelfDepthOffsets[si])||0;
      if(off!==0){
        const d=Math.round(innerD+off);
        const sy=cy1+c.shelfPos[si]*cH;
        ctx.fillText(`D${d}`,cx2-2,sy+Math.max(3,Tpx*0.35));
      }
    }
  }
  ctx.restore();
}

// positions: 선반 중심 비율 배열, selIdx: 선택 인덱스, shelfTypes: 배열 또는 'fixed'|'adj'
function drawShelves(ctx,x,y,w,h,positions,Tpx,sc,selIdx,shelfTypes,ci){
  for(let i=0;i<positions.length;i++){
    const t=Array.isArray(shelfTypes)?(shelfTypes[i]||'fixed'):shelfTypes;
    const isAdj=(t==='adj');
    const sy=y+positions[i]*h-Tpx/2;
    const isSel=(selIdx===i);
    const isHov=_hover&&_hover.type==='shelf'&&_hover.ci===ci&&_hover.idx===i;
    // 배경색
    const pcS = _partColor ? (isAdj?PART_COLORS.shelfAdj:PART_COLORS.shelf) : null;
    const baseCol = isAdj ? '#c8c8c8' : '#d5d5d5';
    ctx.fillStyle = isSel?'#e0e0e0': isHov?'#efefef': (pcS?pcS.fill:baseCol);
    ctx.fillRect(x+1,sy,w-2,Tpx);
    ctx.strokeStyle=isSel?'#000':isHov?'#444':(pcS?pcS.stroke:(isAdj?'#888':'#555'));
    ctx.lineWidth=0.8;
    ctx.strokeRect(x+1,sy,w-2,Tpx);
    // 이동형: 선반핀 홀 점 표시
    if(isAdj&&Tpx>4){
      const dotR=Math.max(1,Math.min(2.5,Tpx*0.18));
      const spacing=Math.max(16,28*sc);
      ctx.fillStyle=isSel?'#000':isHov?'#444':'#888';
      for(let dx=x+spacing;dx<x+w-spacing/2;dx+=spacing){
        ctx.beginPath();ctx.arc(dx,sy+Tpx/2,dotR,0,Math.PI*2);ctx.fill();
      }
    }
    if(Tpx>10&&sc){
      ctx.fillStyle=isSel?'#000':isHov?'#444':isAdj?'#888':'#888';
      ctx.font=`${Math.max(7,Math.round(sc*7.5))}px 'Malgun Gothic',sans-serif`;
      ctx.textAlign='right';
      ctx.fillText(`T${S.T}`,x-2,sy+Tpx/2+3);
    }
  }
}
// 각 공간(칸)의 높이(mm)를 캔버스에 표기
function drawSpaceDims(ctx,x,y,w,h,positions,Tpx,sc,equalDiv){
  const spaces=[];
  if(positions.length===0){
    spaces.push({t:y,b:y+h});
  } else {
    spaces.push({t:y, b:y+positions[0]*h-Tpx/2});
    for(let i=0;i<positions.length-1;i++)
      spaces.push({t:y+positions[i]*h+Tpx/2, b:y+positions[i+1]*h-Tpx/2});
    spaces.push({t:y+positions[positions.length-1]*h+Tpx/2, b:y+h});
  }
  const fntSz=Math.max(9,Math.round(sc*10));
  ctx.textAlign='center';
  // 등간격이면 첫 공간 높이로 모두 동일 판정
  const allEqual = equalDiv && spaces.length>1;
  for(let si=0;si<spaces.length;si++){
    const sp=spaces[si];
    const spH=sp.b-sp.t;
    if(spH<fntSz+6) continue;
    const spMm=Math.round(spH/sc);
    const midX=x+w/2, midY=(sp.t+sp.b)/2;
    ctx.font=`bold ${fntSz}px 'Malgun Gothic',sans-serif`;
    // 등간격 모드: "= 숫자" 형식
    const label = allEqual ? `= ${spMm}` : `${spMm}`;
    const tw=ctx.measureText(label).width;
    // 반투명 배경
    const bx=midX-tw/2-4, by2=midY-fntSz+1, bw=tw+8, bh=fntSz+4;
    ctx.fillStyle= allEqual ? 'rgba(0,0,0,0.07)' : 'rgba(0,0,0,0.04)';
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(bx,by2,bw,bh,3):ctx.fillRect(bx,by2,bw,bh);
    ctx.fill();
    ctx.strokeStyle= allEqual ? '#888' : '#ccc'; ctx.lineWidth=0.8;
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(bx,by2,bw,bh,3):ctx.strokeRect(bx,by2,bw,bh);
    ctx.stroke();
    ctx.fillStyle= allEqual ? '#000' : '#444';
    ctx.fillText(label,midX,midY+fntSz/3);
  }
}
function drawDrawers(ctx,x,y,w,h,n,sc){
  const dh=h/n;
  const fntSz=Math.max(9,Math.round(sc*10));
  for(let i=0;i<n;i++){
    const dy=y+dh*i; ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.strokeRect(x+4,dy+3,w-8,dh-6);
    drawHandle(ctx,x+w/2,dy+dh/2,sc);
    if(dh>fntSz+10){
      const dhMm=Math.round(dh/sc);
      const midX=x+w/2, midY=dy+dh/2;
      ctx.font=`bold ${fntSz}px 'Malgun Gothic',sans-serif`;
      ctx.textAlign='center';
      const tw=ctx.measureText(`${dhMm}`).width;
      ctx.fillStyle='rgba(0,0,0,0.04)';
      const bx=midX-tw/2-4,by=midY-fntSz+1,bw=tw+8,bh=fntSz+4;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.fillRect(bx,by,bw,bh);
      ctx.fill();
      ctx.strokeStyle='#ccc';ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.strokeRect(bx,by,bw,bh);
      ctx.stroke();
      ctx.fillStyle='#444';
      ctx.fillText(`${dhMm}`,midX,midY+fntSz/3);
    }
  }
}
function drawHandle(ctx,x,y,sc){
  ctx.strokeStyle='#222';ctx.fillStyle='#222';ctx.lineWidth=0.8;
  if(S.handle==='bar'){const hl=Math.max(8,20*sc);L(ctx,x,y-hl/2,x,y+hl/2);}
  else if(S.handle==='knob'){ctx.beginPath();ctx.arc(x,y,Math.max(2.5,3.5*sc),0,Math.PI*2);ctx.fill();}
}
function tri(ctx,x,y,s,d){
  ctx.beginPath();
  if(d==='r'){ctx.moveTo(x+s,y);ctx.lineTo(x,y-s);ctx.lineTo(x,y+s);}
  if(d==='l'){ctx.moveTo(x-s,y);ctx.lineTo(x,y-s);ctx.lineTo(x,y+s);}
  if(d==='d'){ctx.moveTo(x,y+s);ctx.lineTo(x-s,y);ctx.lineTo(x+s,y);}
  if(d==='u'){ctx.moveTo(x,y-s);ctx.lineTo(x-s,y);ctx.lineTo(x+s,y);}
  ctx.closePath();ctx.fill();
}
function dimH(ctx,x,y,len,lbl,col){
  ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
  L(ctx,x,y,x+len,y);L(ctx,x,y-6,x,y+6);L(ctx,x+len,y-6,x+len,y+6);
  tri(ctx,x,y,5,'r');tri(ctx,x+len,y,5,'l');
  ctx.font=`bold 11px 'Malgun Gothic',sans-serif`;ctx.textAlign='center';ctx.fillText(lbl,(x+x+len)/2,y-6);
}
function dimV(ctx,x,y,len,lbl,col){
  ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
  L(ctx,x,y,x,y+len);L(ctx,x-6,y,x+6,y);L(ctx,x-6,y+len,x+6,y+len);
  tri(ctx,x,y,5,'d');tri(ctx,x,y+len,5,'u');
  ctx.save();ctx.translate(x+14,(y+y+len)/2);ctx.rotate(-Math.PI/2);
  ctx.font=`bold 11px 'Malgun Gothic',sans-serif`;ctx.textAlign='center';ctx.fillText(lbl,0,0);ctx.restore();
}

let rTimer;
window.addEventListener('resize',()=>{clearTimeout(rTimer);rTimer=setTimeout(draw,80);});

// ── 선반 하단 거리 계산 / 입력 핸들러 ─────────────────
function _shelfEffH(ci){
  // 해당 칸의 선반이 위치하는 높이 범위(px)
  if(!_cs.sc) return {areaY:0,areaH:0};
  const {cy1,cy2}=_cs;
  const iH=cy2-cy1;
  const c=S.cols[ci];
  return {areaY:cy1, areaH:(c&&c.type==='mixed')?iH*0.55:iH};
}
function calcFromBottom(ci,idx){
  // 선반 하면 → 지판 내면 거리 (mm)
  if(!_cs.sc) return 0;
  const c=S.cols[ci];
  if(!c||!c.shelfPos||idx>=c.shelfPos.length) return 0;
  const {cy2,Tpx,sc}=_cs;
  const {areaY,areaH}=_shelfEffH(ci);
  const shelfBotY=areaY+c.shelfPos[idx]*areaH+Tpx/2;
  return Math.round((cy2-shelfBotY)/sc);
}
let _barSelKey='';
// ── 깊이 단차 헬퍼 ──────────────────────────────────
function getDepthOffset(){
  if(!_sel) return 0;
  const {type,ci,idx}=_sel;
  if(type==='shelf') return (S.cols[ci]?.shelfDepthOffsets?.[idx])||0;
  if(type==='topPanel') return S.topDepthOffset||0;
  if(type==='botPanel') return S.botDepthOffset||0;
  if(type==='vdiv') return (S.vDivDepthOffsets?.[idx])||0;
  return 0;
}
function setDepthOffset(val){
  if(!_sel) return;
  const v=Math.round(parseFloat(val));
  if(isNaN(v)) return;
  const {type,ci,idx}=_sel;
  if(type==='shelf'){
    if(!S.cols[ci].shelfDepthOffsets) S.cols[ci].shelfDepthOffsets=Array(S.cols[ci].shelfPos.length).fill(0);
    S.cols[ci].shelfDepthOffsets[idx]=v;
  } else if(type==='topPanel') S.topDepthOffset=v;
  else if(type==='botPanel') S.botDepthOffset=v;
  else if(type==='vdiv'){
    if(!S.vDivDepthOffsets) S.vDivDepthOffsets=[];
    S.vDivDepthOffsets[idx]=v;
  }
}
function applyDepthOffset(val){
  setDepthOffset(val);
  const inp=document.getElementById('depthOffsetInput');
  if(inp) inp.value=getDepthOffset();
  draw();
  if(document.getElementById('paneParts').classList.contains('active')) renderParts();
}
function nudgeDepthOffset(d){
  applyDepthOffset(getDepthOffset()+d);
}

function syncShelfPosBar(){
  const bar=document.getElementById('partEditBar');
  if(!bar) return;
  const TYPES=['shelf','topPanel','botPanel','vdiv','sidePanel'];
  if(!_sel||!_cs.sc||!TYPES.includes(_sel.type)){
    bar.style.display='none'; _barSelKey=''; return;
  }
  bar.style.display='flex';
  const {type}=_sel;
  const LBL=['A','B','C','D'];
  const isSide=(type==='sidePanel');

  // 부속 이름
  const lbl=document.getElementById('partEditLabel');
  if(lbl) lbl.textContent=
    type==='topPanel'?'상판':type==='botPanel'?'지판':
    type==='sidePanel'?`측판 (${_sel.side==='left'?'좌':'우'})`:
    type==='vdiv'?`칸막이 ${_sel.idx+1}`:
    `${S.vCols>1?LBL[_sel.ci]+'칸 ':''}선반 ${_sel.idx+1}`;

  // 위치 섹션 (선반만)
  const posSection=document.getElementById('posEditSection');
  if(posSection) posSection.style.display=type==='shelf'?'flex':'none';
  if(type==='shelf'){
    const {ci,idx}=_sel;
    const c=S.cols[ci];
    if(c&&c.shelfPos&&idx<c.shelfPos.length){
      const selKey=`${ci}-${idx}`;
      const input=document.getElementById('shelfPosInput');
      if(input&&(selKey!==_barSelKey||document.activeElement!==input))
        input.value=calcFromBottom(ci,idx);
      _barSelKey=selKey;
      const range=document.getElementById('shelfPosRange');
      if(range){
        const {sc}=_cs; const {areaH}=_shelfEffH(ci);
        range.textContent=`범위 ${S.T}~${Math.round(areaH/sc)-S.T}mm`;
      }
    }
  } else { _barSelKey=''; }

  // 깊이 단차 (측판은 기준 부재이므로 비활성)
  const depthSection=document.getElementById('depthOffsetInput');
  const depthNudges=bar.querySelectorAll('button[onclick^="nudgeDepth"]');
  const isDepthEditable=!isSide;
  if(depthSection) depthSection.disabled=isSide;
  depthNudges.forEach(b=>b.disabled=isSide);

  const depthInp=document.getElementById('depthOffsetInput');
  if(depthInp&&document.activeElement!==depthInp){
    depthInp.value=isSide?0:getDepthOffset();
    depthInp.style.opacity=isSide?'0.4':'1';
  }
  const depthRef=document.getElementById('depthRefLabel');
  if(depthRef){
    if(isSide){
      depthRef.textContent=`기준 부재 ${S.d}mm`;
    } else {
      const off=getDepthOffset();
      const baseD=(type==='shelf')
        ? (S.backJoint==='dado'?S.d-S.dadoPos-S.dadoW:S.d-S.backT)
        : S.d;
      const actual=baseD+off;
      depthRef.textContent=off===0?`기준 ${baseD}mm`:`기준 ${baseD}mm → 실제 ${actual}mm`;
    }
  }
}
function applyShelfPosInput(val){
  if(!_sel||_sel.type!=='shelf') return;
  const {ci,idx}=_sel;
  const c=S.cols[ci];
  if(!c||!c.shelfPos) return;
  const fromBot=parseFloat(val);
  if(isNaN(fromBot)||fromBot<0) return;
  const {cy1,cy2,Tpx,sc}=_cs;
  if(!sc) return;
  const {areaY,areaH}=_shelfEffH(ci);
  // shelfBotY = cy2 - fromBot*sc  →  pos = (shelfBotY - Tpx/2 - areaY) / areaH
  const shelfBotY=cy2-fromBot*sc;
  let newPos=(shelfBotY-Tpx/2-areaY)/areaH;
  const positions=c.shelfPos;
  const minGap=Tpx/areaH+0.01;
  const lo=idx>0?positions[idx-1]+minGap:minGap/2;
  const hi=idx<positions.length-1?positions[idx+1]-minGap:1-minGap/2;
  positions[idx]=Math.max(lo,Math.min(hi,newPos));
  draw();
}
function nudgeShelf(deltaMm){
  if(!_sel||_sel.type!=='shelf') return;
  const cur=calcFromBottom(_sel.ci,_sel.idx);
  applyShelfPosInput(cur+deltaMm);
  const input=document.getElementById('shelfPosInput');
  if(input) input.value=calcFromBottom(_sel.ci,_sel.idx);
}

// ── 코너 줌 팝업 (HTML/SVG, 도면 외부 표시) ────────────
function cornerZoomSVG(isTop, isLeft, joint, pName) {
  const W=144, H=96, TZ=26;
  const hF='#e8e8e8', hS='#333';
  const sF='#d0d0d0', sS='#555';
  const REST=H-TZ, RESTW=W-TZ;
  let r=[], labels=[];

  function rect(x,y,w,h,fill,stroke){ r.push(`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>`); }
  function txt(x,y,t,col){ labels.push(`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="${col}" font-size="9" font-weight="bold" font-family="Malgun Gothic,sans-serif">${t}</text>`); }

  if(isTop) {
    if(joint==='over') {
      rect(0,0,W,TZ,hF,hS); txt(W/2,TZ/2,pName,hS);
      if(isLeft){ rect(0,TZ,TZ,REST,sF,sS); txt(TZ/2,TZ+REST/2,'측판',sS); }
      else       { rect(RESTW,TZ,TZ,REST,sF,sS); txt(RESTW+TZ/2,TZ+REST/2,'측판',sS); }
    } else {
      if(isLeft){ rect(0,0,TZ,H,sF,sS); txt(TZ/2,H/2,'측판',sS); rect(TZ,0,RESTW,TZ,hF,hS); txt(TZ+RESTW/2,TZ/2,pName,hS); }
      else       { rect(RESTW,0,TZ,H,sF,sS); txt(RESTW+TZ/2,H/2,'측판',sS); rect(0,0,RESTW,TZ,hF,hS); txt(RESTW/2,TZ/2,pName,hS); }
    }
  } else {
    if(joint==='under') {
      rect(0,REST,W,TZ,hF,hS); txt(W/2,REST+TZ/2,pName,hS);
      if(isLeft){ rect(0,0,TZ,REST,sF,sS); txt(TZ/2,REST/2,'측판',sS); }
      else       { rect(RESTW,0,TZ,REST,sF,sS); txt(RESTW+TZ/2,REST/2,'측판',sS); }
    } else {
      if(isLeft){ rect(0,0,TZ,H,sF,sS); txt(TZ/2,H/2,'측판',sS); rect(TZ,REST,RESTW,TZ,hF,hS); txt(TZ+RESTW/2,REST+TZ/2,pName,hS); }
      else       { rect(RESTW,0,TZ,H,sF,sS); txt(RESTW+TZ/2,H/2,'측판',sS); rect(0,REST,RESTW,TZ,hF,hS); txt(RESTW/2,REST+TZ/2,pName,hS); }
    }
  }
  return `<svg width="${W}" height="${H}" style="display:block">${r.join('')}${labels.join('')}</svg>`;
}

function showCornerPopups(corners) {
  const overlay = document.getElementById('czOverlay');
  if(!overlay) return;
  overlay.innerHTML = '';
  if(!corners.length) return;

  const cv = document.getElementById('cv');
  if(!cv || !_cs.sc) return;
  const rect = cv.getBoundingClientRect();
  const {ox, oy, fw, fh} = _cs;
  const scX = rect.width / cv.width;
  const scY = rect.height / cv.height;
  const BOX_W=160, BOX_H=130, GAP=10;

  for(const {corner, a} of corners) {
    const isTop  = corner.startsWith('top');
    const isLeft = corner.endsWith('Left');
    const joint  = isTop ? S.topJoint : S.bottomJoint;
    const jName  = joint==='over'?'올라탐형':joint==='under'?'아래형':'끼움형';
    const pName  = isTop ? '상판' : '지판';

    // 모서리 화면 좌표
    const cx = rect.left + (isLeft ? ox : ox+fw) * scX;
    const cy = rect.top  + (isTop  ? oy : oy+fh) * scY;

    // 도면 외부: 좌우로 붙임
    let popX = isLeft ? cx - BOX_W - GAP : cx + GAP;
    let popY = cy - BOX_H/2;
    popX = Math.max(4, Math.min(popX, window.innerWidth  - BOX_W - 4));
    popY = Math.max(4, Math.min(popY, window.innerHeight - BOX_H - 4));

    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed;left:${popX}px;top:${popY}px;width:${BOX_W}px;
      opacity:${a};transition:opacity 0.05s;
      background:rgba(255,255,255,0.98);border:1.5px solid #333;
      border-radius:10px;overflow:hidden;
      box-shadow:0 6px 22px rgba(0,0,0,0.18);
      font-family:'Malgun Gothic',sans-serif;
    `;
    el.innerHTML = `
      <div style="background:rgba(0,0,0,0.05);padding:5px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,0.10)">
        <span style="font-size:11px;font-weight:700;color:#111">▶ ${pName} ${jName}</span>
        <span style="font-size:10px;color:#999">T${S.T}</span>
      </div>
      <div style="padding:8px">${cornerZoomSVG(isTop,isLeft,joint,pName)}</div>
    `;
    overlay.appendChild(el);
  }
}

// ── Canvas 마우스 인터랙션 ────────────────────────────
(function(){
  const cv=document.getElementById('cv');

  function cornerHitTest(mx,my){
    if(!_cs.ox && _cs.ox!==0) return null;
    const {ox,oy,fw,fh,Tpx}=_cs;
    const R=Math.max(22, Tpx*2.8);
    if(mx>ox-R&&mx<ox+R&&my>oy-R&&my<oy+R)         return 'topLeft';
    if(mx>ox+fw-R&&mx<ox+fw+R&&my>oy-R&&my<oy+R)   return 'topRight';
    if(mx>ox-R&&mx<ox+R&&my>oy+fh-R&&my<oy+fh+R)   return 'botLeft';
    if(mx>ox+fw-R&&mx<ox+fw+R&&my>oy+fh-R&&my<oy+fh+R) return 'botRight';
    return null;
  }

  function hitTest(mx,my){
    if(!_cs.sc) return null;
    const {ox,oy,fw,fh,Tpx,innerXstart,innerWpx,colBounds,cy1,cy2,
           sideHpx,sideY1,sideY2,topPanelY,botPanelY,topX,topW_px,botX,botW_px}=_cs;
    const hit=Math.max(10,Tpx+4);

    // ── 선반 히트 (우선 체크: 가장 좁은 hit area)
    for(let ci=0;ci<S.vCols;ci++){
      const c=S.cols[ci];
      if(!c.shelfPos||!c.shelfPos.length) continue;
      const{cx1,cx2}=colBounds[ci];
      if(mx<cx1-4||mx>cx2+4) continue;
      const totalH=cy2-cy1;
      const h=c.type==='mixed'?totalH*0.55:totalH;
      const y=cy1;
      for(let j=0;j<c.shelfPos.length;j++){
        if(Math.abs(my-(y+c.shelfPos[j]*h))<hit)
          return{type:'shelf',ci,idx:j,h,y};
      }
    }
    // ── 수직 칸막이 히트
    for(let i=0;i<(S.vDivPos||[]).length;i++){
      const cx=innerXstart+S.vDivPos[i]*innerWpx;
      if(Math.abs(mx-cx)<hit&&my>cy1&&my<cy2)
        return{type:'vdiv',idx:i};
    }
    // ── 상판 히트 (끼움형·올라탐형 모두)
    if(mx>=topX&&mx<=topX+topW_px&&my>=topPanelY&&my<=topPanelY+Tpx)
      return{type:'topPanel'};
    // ── 지판 히트
    if(mx>=botX&&mx<=botX+botW_px&&my>=botPanelY&&my<=botPanelY+Tpx)
      return{type:'botPanel'};
    // ── 측판 좌/우 히트
    if(mx>=ox&&mx<=ox+Tpx&&my>=sideY1&&my<=sideY2)
      return{type:'sidePanel',side:'left'};
    if(mx>=ox+fw-Tpx&&mx<=ox+fw&&my>=sideY1&&my<=sideY2)
      return{type:'sidePanel',side:'right'};
    return null;
  }

  // 커서 스타일 매핑
  function cursorFor(h){
    if(!h) return 'default';
    if(h.type==='vdiv') return 'ew-resize';
    if(h.type==='topPanel'||h.type==='botPanel') return 'ns-resize';
    if(h.type==='shelf') return S.cols[h.ci]?.equalDiv ? 'default' : 'ns-resize';
    return 'pointer';
  }

  cv.addEventListener('mousedown',e=>{
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const h=hitTest(mx,my);
    if(h){
      if(h.type==='topPanel'){
        _sel={type:'topPanel'};
        if(S.topJoint==='between')
          _drag={type:'topPanel',startY:my,startPos:S.topPanelPos||0,sideHpx:_cs.sideHpx};
      } else if(h.type==='botPanel'){
        _sel={type:'botPanel'};
        if(S.bottomJoint==='between')
          _drag={type:'botPanel',startY:my,startPos:S.botPanelPos||0,sideHpx:_cs.sideHpx};
      } else if(h.type==='sidePanel'){
        _sel={type:'sidePanel',side:h.side};
      } else if(h.type==='vdiv'){
        _sel={type:'vdiv',idx:h.idx};
        _drag={type:'vdiv',idx:h.idx,startX:mx,startPos:S.vDivPos[h.idx]};
      } else {
        _sel={type:'shelf',ci:h.ci,idx:h.idx};
        // 등간격 분할 모드이면 드래그 비활성
        if(!S.cols[h.ci].equalDiv)
          _drag={type:'shelf',ci:h.ci,idx:h.idx,startY:my,
                 startPos:S.cols[h.ci].shelfPos[h.idx],h:h.h,y:h.y};
      }
    } else {
      _sel=null;
    }
    draw(); syncShelfPosBar(); e.preventDefault();
  });

  cv.addEventListener('mousemove',e=>{
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const h=hitTest(mx,my);
    cv.style.cursor=cursorFor(h);

    // 코너 호버 감지
    const prevCorner = _cornerHover;
    _cornerHover = cornerHitTest(mx,my);
    const cornerChanged = prevCorner !== _cornerHover;

    // 호버 상태 변경 시에만 재드로우
    const prevKey=_hover?JSON.stringify(_hover):null;
    _hover = h;
    const newKey=_hover?JSON.stringify(_hover):null;
    if((prevKey!==newKey || cornerChanged) && !_drag) draw();

    if(!_drag) return;
    const{Tpx,innerWpx}=_cs;

    if(_drag.type==='topPanel'){
      let newPos=_drag.startPos+(my-_drag.startY)/_drag.sideHpx;
      S.topPanelPos=Math.max(0,Math.min(0.6,newPos));
      draw();
    } else if(_drag.type==='botPanel'){
      let newPos=_drag.startPos-(my-_drag.startY)/_drag.sideHpx;
      S.botPanelPos=Math.max(0,Math.min(0.6,newPos));
      draw();
    } else if(_drag.type==='shelf'){
      const dy=my-_drag.startY;
      const positions=S.cols[_drag.ci].shelfPos;
      let newPos=_drag.startPos+dy/_drag.h;
      const minGap=Tpx/_drag.h+0.01;
      const lo=_drag.idx>0?positions[_drag.idx-1]+minGap:minGap/2;
      const hi=_drag.idx<positions.length-1?positions[_drag.idx+1]-minGap:1-minGap/2;
      positions[_drag.idx]=Math.max(lo,Math.min(hi,newPos));
      draw();
    } else if(_drag.type==='vdiv'){
      const dx=mx-_drag.startX;
      let newPos=_drag.startPos+dx/innerWpx;
      const minGap=Tpx/innerWpx+0.02;
      const lo=_drag.idx>0?S.vDivPos[_drag.idx-1]+minGap:minGap;
      const hi=_drag.idx<S.vDivPos.length-1?S.vDivPos[_drag.idx+1]-minGap:1-minGap;
      S.vDivPos[_drag.idx]=Math.max(lo,Math.min(hi,newPos));
      draw();
    }
  });

  cv.addEventListener('mouseleave',()=>{
    _drag=null;
    const hadChange = _hover || _cornerHover;
    _hover=null; _cornerHover=null;
    if(hadChange) draw();
  });
  cv.addEventListener('mouseup',()=>{ _drag=null; });
})();

render();
</script>
